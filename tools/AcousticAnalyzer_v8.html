<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switchgear Acoustic Simulator v8 (Fixed Audio & Sliders)</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --panel-color: #f8f9fa;
            --text-color: #333333;
            --accent-color: #0dad55; 
            --elec-color: #2980b9;   
            --input-bg: #ffffff;
            --border-color: #e0e0e0;
            --shadow-color: rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            background: white;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; font-size: 1.5rem; color: darkred; font-weight: 700; }
        
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* LEFT SIDEBAR */
        .sidebar {
            width: 380px;
            background-color: var(--panel-color);
            padding: 20px;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 2px 0 10px var(--shadow-color);
            z-index: 5;
        }

        .control-group {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 5px var(--shadow-color);
        }

        .control-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #555; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; cursor: pointer; }
        .slider-val { font-weight: bold; width: 35px; text-align: right; color: #333; }

        .harmonics-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            max-height: 200px; overflow-y: auto; padding-right: 5px;
        }

        .harmonic-input {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 0.8rem; background: #fdfdfd; padding: 5px 8px;
            border-radius: 4px; border: 1px solid #eee;
        }
        .harmonic-input input {
            width: 50px; border: none; border-bottom: 1px solid #ccc;
            text-align: right; font-weight: bold; color: var(--elec-color);
        }

        .stats-bar {
            background: white; padding: 10px; border-radius: 8px;
            text-align: center; font-size: 1rem; font-weight: bold;
            border: 2px solid var(--elec-color); color: #333;
        }

        button { cursor: pointer; border-radius: 4px; font-weight: bold; border: none; transition: 0.2s; }
        button.reset-btn { background-color: #555; color: white; padding: 12px; width: 100%; margin-bottom: 10px; }
        button.reset-btn:hover { background-color: #333; }

        .collapsible-header {
            width: 100%; text-align: left; padding: 10px; background: #eee;
            border: 1px solid #ccc; color: #333; font-size: 0.9rem;
            display: flex; justify-content: space-between; margin-top: 5px;
        }
        .collapsible-header:hover { background: #e0e0e0; }
        .collapsible-content { display: none; padding: 10px; background: white; border: 1px solid #ccc; border-top: none; }
        
        .csv-textarea {
            width: 100%; height: 120px; font-family: monospace; font-size: 0.8rem;
            border: 1px solid #ccc; resize: vertical; box-sizing: border-box;
            padding: 5px; white-space: pre; overflow-y: auto; color: #333; background: #fafafa;
        }

        .apply-btn { background-color: var(--elec-color); color: white; padding: 8px; width: 100%; margin-top: 5px; }
        .copy-btn { background-color: #7f8c8d; color: white; padding: 8px; width: 100%; margin-top: 5px; }
        .status-msg { font-size: 0.75rem; margin-top: 5px; min-height: 1rem; }

        /* Audio Play Buttons Specific */
        .play-btn {
            background-color: var(--accent-color); color: white; padding: 10px;
            font-size: 1rem; width: 100%; border-radius: 6px; margin-bottom: 5px;
        }
        .play-btn:hover { background-color: #0b9648; }
        .play-btn.playing { background-color: #e74c3c; }
        .play-btn.playing:hover { background-color: #c0392b; }

        .wav-btn {
            background-color: #8e44ad; color: white; padding: 10px;
            font-size: 1rem; width: 100%; border-radius: 6px; margin-bottom: 5px;
        }
        .wav-btn:hover { background-color: #732d91; }

        /* RIGHT DASHBOARD */
        .dashboard {
            flex: 1; overflow-y: auto; padding: 20px;
            background-color: #f0f2f5; display: flex; flex-direction: column; gap: 20px;
        }
        .chart-card {
            background: white; border-radius: 8px; padding: 10px;
            box-shadow: 0 2px 8px var(--shadow-color); border: 1px solid var(--border-color); min-height: 350px;
        }
        h3.chart-title { margin: 0 0 10px 10px; font-size: 1rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <header>
        <h1>Switchgear Acoustic Simulator v8</h1>
        <div style="font-size: 0.8rem; color: #666;">Audio Synthesis & WAV Export Enabled</div>
    </header>

    <div class="main-layout">
        <!-- LEFT SIDEBAR -->
        <div class="sidebar">
            
            <!-- AUDIO PLAYER MODULE -->
            <div class="control-group" style="background-color: #f4ecf7; border-color: #8e44ad;">
                <button id="wavBtn" class="wav-btn" onclick="exportWav()">💾 Download 10s WAV File</button>
                <button id="playBtn" class="play-btn" onclick="toggleAudio()">🔈 Preview Sound in Browser</button>
                <div class="slider-container" style="margin-top: 10px;">
                    <span style="font-size: 0.85rem; color:#555; width:auto; font-weight:600;">Preview Vol</span>
                    <input type="range" id="master_vol" min="0" max="1" step="0.01" value="0.5">
                </div>
                <div id="audio-status" style="font-size:0.75rem; color:#666; text-align:center; margin-top:5px; font-weight:bold;"></div>
            </div>

            <div class="stats-bar">
                THD: <span id="thd_display" style="color:var(--elec-color)">0.00</span>%
            </div>

            <div>
                <button class="collapsible-header" onclick="toggleEditor('harmonic-panel', 'harmonic-arrow')">
                    <span>⚡ Harmonic Setup (CSV)</span><span id="harmonic-arrow">▼</span>
                </button>
                <div id="harmonic-panel" class="collapsible-content">
                    <textarea id="harmonicCsvInput" class="csv-textarea" spellcheck="false"></textarea>
                    <button class="apply-btn" onclick="parseAndApplyHarmonicCSV()">Apply Harmonics</button>
                    <div id="harmonic-status" class="status-msg"></div>
                </div>
            </div>

            <div>
                <button class="collapsible-header" onclick="toggleEditor('enclosure-panel', 'enclosure-arrow')">
                    <span>🛠️ Enclosure Setup (CSV)</span><span id="enclosure-arrow">▼</span>
                </button>
                <div id="enclosure-panel" class="collapsible-content">
                    <textarea id="enclosureCsvInput" class="csv-textarea" spellcheck="false"></textarea>
                    <button class="apply-btn" onclick="parseAndApplyEnclosureCSV()">Apply Profile</button>
                    <button style="width:100%; margin-top:5px; background:#eee; color:#333; padding:5px; border:none;" onclick="resetEnclosureData()">Restore Default</button>
                    <div id="enclosure-status" class="status-msg"></div>
                </div>
            </div>

            <div>
                <button class="collapsible-header" onclick="toggleEditor('results-panel', 'results-arrow')">
                    <span>📊 Export Results (CSV)</span><span id="results-arrow">▼</span>
                </button>
                <div id="results-panel" class="collapsible-content">
                    <textarea id="resultsOutput" class="csv-textarea" readonly style="background:#fff; font-weight:bold;"></textarea>
                    <button class="copy-btn" onclick="copyResults()">Copy to Clipboard</button>
                    <div id="results-status" class="status-msg"></div>
                </div>
            </div>

            <!-- PHYSICS SLIDERS -->
            <div class="control-group">
                <label>Cancellation Factor (k)</label>
                <div class="slider-container">
                    <input type="range" id="k_cancel" min="0" max="1" step="0.05" value="0.1">
                    <span id="val_k_cancel" class="slider-val">0.1</span>
                </div>
            </div>

            <div class="control-group">
                <label>Enclosure Characteristic Impact</label>
                <div class="slider-container">
                    <input type="range" id="k_power" min="0" max="15" step="0.5" value="5.0">
                    <span id="val_k_power" class="slider-val">5.0</span>
                </div>
            </div>

            <div class="control-group">
                <label>Harmonic Currents (Amps)</label>
                <div class="harmonics-grid" id="harmonics_container"></div>
            </div>

            <button class="reset-btn" onclick="resetDefaults()">Reset All Defaults</button>
        </div>

        <!-- RIGHT DASHBOARD -->
        <div class="dashboard">
            <div class="chart-card">
                <h3 class="chart-title">1. Acoustic Output Spectrum (Simulated)</h3>
                <div id="plotAcoustic" style="width:100%; height:400px;"></div>
            </div>
            <div class="chart-card">
                <h3 class="chart-title">2. Electrical Current Waveform (3 Periods)</h3>
                <div id="plotWaveform" style="width:100%; height:300px;"></div>
            </div>
            <div class="chart-card">
                <h3 class="chart-title">3. Electrical Input Spectrum (Current)</h3>
                <div id="plotCurrentFFT" style="width:100%; height:300px;"></div>
            </div>
        </div>
    </div>

<script>
    // ==========================================
    // 1. DATA & STATE
    // ==========================================
    const defaultHarmonics =[0, 700, 0, 2, 0, 8, 0, 7, 0, 11, 0, 0, 0, 7, 0, 7, 0, 7, 0, 7, 0, 7];
    while(defaultHarmonics.length < 26) defaultHarmonics.push(0);

    const defaultEnclosureCurvePoints = [[0.0, 0.3708],[10.0, 0.3759],[20.0, 0.4422],[30.0, 0.4164],[40.0, 0.4491],[50.1, 0.4588],[60.1, 0.4451],[70.1, 0.4783],[80.1, 0.5704],[90.1, 0.5467],[100.1, 0.5072],[110.1, 0.5791], [120.1, 0.5288],[130.1, 0.6112],[140.1, 0.5245],[150.2, 0.631],[160.2, 0.6112],[170.2, 0.72],[180.2, 0.6891],[190.2, 0.6555],[200.2, 0.7059],[210.2, 0.6584],[220.2, 0.6658],[230.2, 0.6908],[240.2, 0.6476],[250.3, 0.7049],[260.3, 0.6884],[270.3, 0.6748],[280.3, 0.7778],[290.3, 0.8108],[300.3, 0.8364], [310.3, 0.8564],[320.3, 0.8483],[330.3, 0.7807],[340.3, 0.8219],[350.4, 0.8291], [360.4, 0.7732],[370.4, 0.8094],[380.4, 0.7967], [390.4, 0.7983],[400.4, 0.8104], [410.4, 0.79],[420.4, 0.8195],[430.4, 0.8474], [440.4, 0.8522],[450.5, 0.8943], [460.5, 0.9826],[470.5, 0.9846],[480.5, 0.9391], [490.5, 0.9156],[500.5, 0.9352],[510.5, 0.9093],[520.5, 0.8877],[530.5, 0.8731],[540.5, 0.8512],[550.6, 0.8664],[560.6, 0.8502],[570.6, 0.8015],[580.6, 0.7576],[590.6, 0.7548],[600.6, 0.7578],[610.6, 0.7579],[620.6, 0.7298],[630.6, 0.7189],[640.6, 0.7333],[650.7, 0.7827],[700.7, 0.7493],[750.8, 0.6169],[800.8, 0.5388],[850.9, 0.4637],[900.9, 0.4107],[951.0, 0.3684],[10000, 0.0]
    ];

    // Variables updated from let to let, but event listeners directly mutate these
    let harmonics = [...defaultHarmonics];
    let k_cancellation = 0.1;
    let k_enclosure_power = 5.0;
    
    let currentEnclosurePoints =[...defaultEnclosureCurvePoints];
    let encFreqs =[], encGains =[];

    const BASE_FREQ = 50, MIN_DB = -90, MIN_PLOT_FREQ = 20, MAX_PLOT_FREQ = 5000;

    // ==========================================
    // 2. AUDIO SYNTHESIS & WAV GENERATION
    // ==========================================
    let audioCtx = null;
    let masterGain = null;
    let activeOscillators =[];
    let isPlaying = false;

    // --- A. WAV File Generator ---
    function exportWav() {
        const btn = document.getElementById('wavBtn');
        const status = document.getElementById('audio-status');
        btn.innerText = "⏳ Generating...";
        btn.disabled = true;
        
        setTimeout(() => {
            const data = runSimulation();
            const peaks = data.acoustic.peaks;
            
            const sampleRate = 44100;
            const duration = 10; // seconds
            const numSamples = duration * sampleRate;
            const buffer = new Float32Array(numSamples);

            let maxTheoreticalAmp = 0;
            peaks.forEach(p => {
                if (p.f < 20 || p.mag <= 0) return;
                let omega = 2 * Math.PI * p.f;
                let amp = p.mag;
                maxTheoreticalAmp += amp;
                for(let j=0; j<numSamples; j++) {
                    buffer[j] += amp * Math.sin(omega * j / sampleRate);
                }
            });

            let maxVal = 0;
            for(let j=0; j<numSamples; j++) {
                if(Math.abs(buffer[j]) > maxVal) maxVal = Math.abs(buffer[j]);
            }
            if(maxVal > 0) {
                for(let j=0; j<numSamples; j++) {
                    buffer[j] = (buffer[j] / maxVal) * 0.9;
                }
            }

            const wavBuffer = new ArrayBuffer(44 + numSamples * 2);
            const view = new DataView(wavBuffer);
            function writeString(v, offset, string) {
                for (let i = 0; i < string.length; i++) v.setUint8(offset + i, string.charCodeAt(i));
            }

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + numSamples * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); // ByteRate
            view.setUint16(32, 2, true); // BlockAlign
            view.setUint16(34, 16, true); // 16-bit
            writeString(view, 36, 'data');
            view.setUint32(40, numSamples * 2, true);

            let offset = 44;
            for (let i = 0; i < numSamples; i++) {
                let s = Math.max(-1, Math.min(1, buffer[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                offset += 2;
            }

            const blob = new Blob([view], { type: 'audio/wav' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `switchgear_sim_${Date.now()}.wav`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            
            btn.innerText = "💾 Download 10s WAV File";
            btn.disabled = false;
            status.innerText = "WAV Exported Successfully!";
            status.style.color = "green";
            setTimeout(() => status.innerText = '', 3000);
        }, 50);
    }

    // --- B. Real-Time Web Audio Preview ---
    function toggleAudio() {
        if (isPlaying) stopAudio();
        else startAudio();
    }

    function startAudio() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);
        masterGain.gain.value = document.getElementById('master_vol').value; 

        // FIX: Must set isPlaying = true BEFORE calling applyCurrentPeaksToAudio!
        isPlaying = true;
        applyCurrentPeaksToAudio();
        
        const btn = document.getElementById('playBtn');
        btn.innerText = '🔇 Stop Browser Preview';
        btn.className = 'play-btn playing';
    }

    function stopAudio() {
        activeOscillators.forEach(node => { node.osc.stop(); node.osc.disconnect(); node.gain.disconnect(); });
        activeOscillators =[];
        if (masterGain) masterGain.disconnect();
        
        isPlaying = false;
        const btn = document.getElementById('playBtn');
        btn.innerText = '🔈 Preview Sound in Browser';
        btn.className = 'play-btn';
    }

    function applyCurrentPeaksToAudio() {
        if (!isPlaying || !audioCtx) return;

        activeOscillators.forEach(node => { node.osc.stop(); node.osc.disconnect(); node.gain.disconnect(); });
        activeOscillators =[];

        const data = runSimulation();
        const peaks = data.acoustic.peaks;

        // Take top 40 strongest frequencies
        let topPeaks = [...peaks].sort((a,b) => b.mag - a.mag).slice(0, 40);
        
        let totalMag = 0;
        topPeaks.forEach(p => { if(p.f>=20) totalMag += p.mag; });

        topPeaks.forEach(p => {
            if(p.f < 20 || p.mag <= 0 || totalMag === 0) return; 
            
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            
            osc.type = 'sine'; 
            osc.frequency.value = p.f;
            
            // Normalize against total sum to prevent clipping distortion
            let fraction = p.mag / totalMag;
            gain.gain.value = fraction; 
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            
            activeOscillators.push({osc: osc, gain: gain});
        });
    }

    document.getElementById('master_vol').addEventListener('input', (e) => {
        if (masterGain && audioCtx) {
            masterGain.gain.setValueAtTime(e.target.value, audioCtx.currentTime);
        }
    });

    // ==========================================
    // 3. MATH & UI HELPERS
    // ==========================================
    function interp(x, xp, fp) {
        if (x < xp[0]) return fp[0];
        if (x > xp[xp.length - 1]) return fp[fp.length - 1];
        let idx = 0; while (x > xp[idx + 1]) idx++;
        const t = (x - xp[idx]) / (xp[idx + 1] - xp[idx]);
        return fp[idx] + t * (fp[idx + 1] - fp[idx]);
    }
    function gaussian(x, amp, center, width=6) { return amp * Math.exp(-0.5 * Math.pow((x - center) / width, 2)); }
    function logSpace(start, end, num) {
        const arr =[]; const step = (Math.log10(end) - Math.log10(start)) / (num - 1);
        for (let i = 0; i < num; i++) arr.push(Math.pow(10, Math.log10(start) + (i * step)));
        return arr;
    }
    function pointsToCSV(points) { return points.map(p => `${p[0]}, ${p[1]}`).join('\n'); }
    function harmonicsToCSV(harmArr) {
        let lines =[]; harmArr.forEach((val, order) => { if(val > 0) lines.push(`${order}, ${val}`); }); return lines.join('\n');
    }
    function generateResultsCSV(peaks, maxLin) {
        let csv = "Frequency (Hz), Level (dBFS)\n";
        peaks.sort((a,b) => a.f - b.f);
        for(let p of peaks) {
            if(p.f < MIN_PLOT_FREQ) continue;
            let db = 20 * Math.log10((p.mag + 1e-9) / maxLin);
            if(db > -90) csv += `${p.f.toFixed(1)}, ${db.toFixed(2)}\n`;
        }
        document.getElementById('resultsOutput').value = csv;
    }
    function copyResults() {
        const copyText = document.getElementById("resultsOutput"); copyText.select();
        navigator.clipboard.writeText(copyText.value).then(() => msg('results-status', 'Copied!', 'green'));
    }
    function updateEnclosureArrays() {
        currentEnclosurePoints.sort((a,b) => a[0] - b[0]);
        encFreqs = currentEnclosurePoints.map(p => p[0]); encGains = currentEnclosurePoints.map(p => p[1]);
    }
    function msg(id, text, color) {
        const el = document.getElementById(id); el.textContent = text; el.style.color = color;
        setTimeout(() => el.textContent = '', 3000);
    }
    function toggleEditor(panelId, arrowId) {
        const panel = document.getElementById(panelId); const arrow = document.getElementById(arrowId);
        if (panel.style.display === 'block') { panel.style.display = 'none'; arrow.textContent = '▼'; } 
        else { panel.style.display = 'block'; arrow.textContent = '▲'; }
    }
    function parseAndApplyEnclosureCSV() {
        const lines = document.getElementById('enclosureCsvInput').value.split('\n'); const newPoints =[];
        for (let line of lines) {
            const parts = line.trim().split(',');
            if (parts.length >= 2 && !isNaN(parseFloat(parts[0])) && !isNaN(parseFloat(parts[1]))) newPoints.push([parseFloat(parts[0]), parseFloat(parts[1])]);
        }
        if (newPoints.length < 2) return msg('enclosure-status', "Error", 'red');
        currentEnclosurePoints = newPoints; updateEnclosureArrays(); updateAllPlots(); msg('enclosure-status', `Loaded ${newPoints.length} pts`, 'green');
    }
    function parseAndApplyHarmonicCSV() {
        const lines = document.getElementById('harmonicCsvInput').value.split('\n');
        let maxOrder = 25;
        for(let line of lines) { const parts = line.split(','); if(parts.length>=2 && parseInt(parts[0])>maxOrder) maxOrder = parseInt(parts[0]); }
        if(maxOrder > 200) maxOrder = 200;
        let newHarmonics = new Array(maxOrder + 1).fill(0); let count = 0;
        for (let line of lines) {
            const parts = line.trim().split(',');
            if (parts.length >= 2 && !isNaN(parseInt(parts[0])) && !isNaN(parseFloat(parts[1]))) { newHarmonics[parseInt(parts[0])] = parseFloat(parts[1]); count++; }
        }
        harmonics = newHarmonics; renderHarmonicsGrid(); updateAllPlots(); msg('harmonic-status', `Loaded ${count} harms`, 'green');
    }
    function resetEnclosureData() {
        currentEnclosurePoints =[...defaultEnclosureCurvePoints]; document.getElementById('enclosureCsvInput').value = pointsToCSV(currentEnclosurePoints);
        updateEnclosureArrays(); updateAllPlots();
    }

    // ==========================================
    // 4. SIMULATION LOGIC
    // ==========================================
    function runSimulation() {
        let fund = harmonics[1] || 0; let sumSq = 0;
        for(let i=2; i<harmonics.length; i++) sumSq += harmonics[i] * harmonics[i];
        document.getElementById('thd_display').textContent = (fund > 0 ? (Math.sqrt(sumSq) / fund) * 100 : 0).toFixed(2);

        let calculatedPeaks = {}; let activeIndices =[];
        harmonics.forEach((val, idx) => { if(val > 0) activeIndices.push(idx); });

        for (let i of activeIndices) {
            for (let j of activeIndices) {
                if (j < i) continue;
                let rawForce = (i === j) ? (harmonics[i] * harmonics[j]) : 2 * (harmonics[i] * harmonics[j]);
                let isZeroSeq = ((i > 0 && i % 3 === 0) || (j > 0 && j % 3 === 0));
                let k = isZeroSeq ? 1.0 : k_cancellation;[(i + j) * BASE_FREQ, Math.abs(i - j) * BASE_FREQ].forEach(f => {
                    if (f > 0) { if (!calculatedPeaks[f]) calculatedPeaks[f] = 0; calculatedPeaks[f] += rawForce * k; }
                });
            }
        }

        const plotFreqs = logSpace(MIN_PLOT_FREQ, MAX_PLOT_FREQ, 2000); const plotAmpsLinear = new Float32Array(plotFreqs.length).fill(0);
        let finalPeakList =[];

        for (let fStr in calculatedPeaks) {
            let f = parseFloat(fStr);
            let finalForce = calculatedPeaks[fStr] * Math.pow(interp(f, encFreqs, encGains), k_enclosure_power);
            finalPeakList.push({f: f, mag: finalForce});
            if (f >= MIN_PLOT_FREQ && finalForce > 0.1) {
                for(let k=0; k<plotFreqs.length; k++) {
                    if (Math.abs(plotFreqs[k] - f) > 50) continue; 
                    plotAmpsLinear[k] += gaussian(plotFreqs[k], finalForce, f, 6);
                }
            }
        }

        let maxLinear = 0; for(let v of plotAmpsLinear) if(v > maxLinear) maxLinear = v; if (maxLinear === 0) maxLinear = 1e-9;
        const plotDb =[]; for(let val of plotAmpsLinear) plotDb.push(Math.max(MIN_DB, 20 * Math.log10((val + 1e-9) / maxLinear)));

        let tArr =[], iArr =[];
        for(let k=0; k<1000; k++) {
            let t = (k / 999) * 0.06; let val = 0;
            harmonics.forEach((amp, order) => { if(amp > 0) val += amp * Math.cos(2 * Math.PI * (order * BASE_FREQ) * t); });
            tArr.push(t * 1000); iArr.push(val);
        }

        let fftX =[], fftY =[]; harmonics.forEach((amp, order) => { if(order > 0) { fftX.push(order * BASE_FREQ); fftY.push(amp); } });

        generateResultsCSV(finalPeakList, maxLinear);
        return { acoustic: { x: plotFreqs, y: plotDb, y_enc: plotFreqs.map(f => interp(f, encFreqs, encGains)), peaks: finalPeakList, maxLin: maxLinear }, waveform: { x: tArr, y: iArr }, elecFFT: { x: fftX, y: fftY } };
    }

    // ==========================================
    // 5. UI & RENDER
    // ==========================================
    function initUI() {
        renderHarmonicsGrid();
        
        // FIX: Assign events and update local state variables explicitly!
        document.getElementById('k_cancel').addEventListener('input', (e) => {
            k_cancellation = parseFloat(e.target.value);
            document.getElementById('val_k_cancel').innerText = k_cancellation;
            updateAllPlots();
        });
        
        document.getElementById('k_power').addEventListener('input', (e) => {
            k_enclosure_power = parseFloat(e.target.value);
            document.getElementById('val_k_power').innerText = k_enclosure_power;
            updateAllPlots();
        });

        document.getElementById('enclosureCsvInput').value = pointsToCSV(currentEnclosurePoints);
        document.getElementById('harmonicCsvInput').value = harmonicsToCSV(harmonics);
        updateEnclosureArrays();
    }

    function renderHarmonicsGrid() {
        const grid = document.getElementById('harmonics_container'); grid.innerHTML = '';
        harmonics.forEach((val, idx) => {
            if(idx > 25 && val === 0) return;
            let div = document.createElement('div'); div.className = 'harmonic-input';
            let label = idx === 0 ? 'DC' : (idx === 1 ? '<b style="color:#2980b9">50Hz</b>' : `${idx}th`);
            div.innerHTML = `<span>${label}</span><input type="number" min="0" step="1" value="${val}" onchange="harmonics[${idx}]=parseFloat(this.value)||0;updateAllPlots()">`;
            grid.appendChild(div);
        });
    }

    function resetDefaults() {
        if(isPlaying) stopAudio();
        harmonics =[...defaultHarmonics]; k_cancellation = 0.1; k_enclosure_power = 5.0;
        document.getElementById('k_cancel').value = 0.1; document.getElementById('val_k_cancel').innerText = "0.1";
        document.getElementById('k_power').value = 5.0; document.getElementById('val_k_power').innerText = "5.0";
        resetEnclosureData(); renderHarmonicsGrid(); updateAllPlots();
    }

    function updateAllPlots() {
        const data = runSimulation();
        if (isPlaying) applyCurrentPeaksToAudio();

        let peakX=[], peakY=[], peakTxt=[];
        let sortedPeaks = [...data.acoustic.peaks].sort((a,b) => b.mag - a.mag);
        for(let i=0; i<Math.min(6, sortedPeaks.length); i++) {
            if(sortedPeaks[i].f < MIN_PLOT_FREQ) continue;
            let db = 20 * Math.log10((sortedPeaks[i].mag + 1e-9) / data.acoustic.maxLin);
            if (db > -60) { peakX.push(sortedPeaks[i].f); peakY.push(db); peakTxt.push(`${Math.round(sortedPeaks[i].f)}Hz<br>${db.toFixed(1)}dB`); }
        }

        const cfg = { responsive: true, displayModeBar: false };
        Plotly.react('plotAcoustic',[
            { x: data.acoustic.x, y: data.acoustic.y, type: 'scatter', mode: 'lines', fill: 'tozeroy', name: 'Acoustic dB', line: { color: '#0dad55', width: 2 }, fillcolor: 'rgba(13, 173, 85, 0.2)' },
            { x: data.acoustic.x, y: data.acoustic.y_enc, type: 'scatter', mode: 'lines', name: 'Enclosure', yaxis: 'y2', line: { color: '#ff8c00', dash: 'dash', width: 1.5 }, hoverinfo: 'none' },
            { x: peakX, y: peakY, mode: 'markers', type: 'scatter', marker: { color: '#333', size: 8, symbol: 'triangle-down' }, text: peakTxt, hoverinfo: 'text', showlegend: false }
        ], {
            margin: { t: 10, r: 40, b: 40, l: 50 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
            xaxis: { type: 'log', title: 'Frequency (Hz)', range:[Math.log10(20), Math.log10(5000)], color: '#666' },
            yaxis: { title: 'dBFS', range:[MIN_DB, 10], color: '#0dad55' },
            yaxis2: { overlaying: 'y', side: 'right', range:[0, 1.1], showgrid: false, showticklabels: false }, showlegend: true, legend: { x: 0.8, y: 1 }
        }, cfg);

        Plotly.react('plotWaveform',[{ x: data.waveform.x, y: data.waveform.y, type: 'scatter', mode: 'lines', line: { color: '#2980b9', width: 2 } }], 
            { margin: { t: 10, r: 20, b: 40, l: 50 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)', xaxis: { title: 'Time (ms)', color: '#666' }, yaxis: { title: 'Current (Amps)', color: '#2980b9' } }, cfg);

        Plotly.react('plotCurrentFFT',[{ x: data.elecFFT.x, y: data.elecFFT.y, type: 'bar', marker: { color: '#2980b9', opacity: 0.7 } }], 
            { margin: { t: 10, r: 20, b: 40, l: 50 }, paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)', xaxis: { title: 'Frequency (Hz)', color: '#666' }, yaxis: { title: 'Amplitude (Amps)', color: '#2980b9' } }, cfg);
    }

    initUI(); updateAllPlots();
</script>
