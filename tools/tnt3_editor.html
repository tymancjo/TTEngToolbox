/* ─────────────────────────────────────────────────────
   Centre panel — event wiring
   ───────────────────────────────────────────────────── */
function attachCentreHandlers() {
  // generic binds
  document.querySelectorAll('[data-bind]').forEach(inp => {
    inp.addEventListener('input', onBindInput);
    inp.addEventListener('change', onBindInput);
  });
  // element rename
  const renameInp = document.getElementById('elem-name');
  if (renameInp) renameInp.addEventListener('change', onElementRename);
  // material editor
  const matNameInp = document.getElementById('mat-name');
  if (matNameInp) matNameInp.addEventListener('change', onMaterialRename);
  document.querySelectorAll('[data-matbind]').forEach(inp => {
    inp.addEventListener('input', onMatBindInput);
    inp.addEventListener('change', onMatBindInput);
  });
  // override toggle
  const showBtn = document.getElementById('show-overrides');
  if (showBtn) showBtn.addEventListener('click', () => { ui.showOverrides = true; render(); });
  const hideBtn = document.getElementById('hide-overrides');
  if (hideBtn) hideBtn.addEventListener('click', () => {
    ui.showOverrides = false;
    if (ui.selectedElement && state.elements[ui.selectedElement]) {
      delete state.elements[ui.selectedElement].htc;
      delete state.elements[ui.selectedElement].emissivity;
      delete state.elements[ui.selectedElement].ac_factor;
    }
    render();
  });
  // DC2BB segment rows
  document.querySelectorAll('[data-segsel]').forEach(sel => sel.addEventListener('change', onSegSelChange));
  document.querySelectorAll('[data-seginp]').forEach(inp => inp.addEventListener('input', onSegInpChange));
  document.querySelectorAll('[data-segdel]').forEach(btn => btn.addEventListener('click', onSegRowDelete));
  document.querySelectorAll('[data-segadd]').forEach(btn => btn.addEventListener('click', onSegRowAdd));
  document.querySelectorAll('[data-segaddsensor]').forEach(btn => btn.addEventListener('click', onSegAddSensor));
  document.querySelectorAll('[data-sensname]').forEach(inp => inp.addEventListener('change', onSensorNameChange));
  // MCC module segment rows
  document.querySelectorAll('[data-msegsel]').forEach(sel => sel.addEventListener('change', onMSegSelChange));
  document.querySelectorAll('[data-mseginp]').forEach(inp => inp.addEventListener('input', onMSegInpChange));
  document.querySelectorAll('[data-msegdel]').forEach(btn => btn.addEventListener('click', onMSegRowDelete));
  document.querySelectorAll('[data-msegadd]').forEach(btn => btn.addEventListener('click', onMSegRowAdd));
}

function setStatePath(path, value) {
  // path like "elements.VBB.width" — navigate state
  const parts = path.split('.');
  let cur = state;
  for (let i = 0; i < parts.length - 1; i++) {
    cur = cur[parts[i]];
    if (cur == null) return;
  }
  cur[parts[parts.length - 1]] = value;
}

function getStatePath(path) {
  const parts = path.split('.');
  let cur = state;
  for (const p of parts) {
    if (cur == null) return undefined;
    cur = cur[p];
  }
  return cur;
}

function onBindInput(ev) {
  const inp = ev.currentTarget;
  const path = inp.dataset.bind;
  const nullable = inp.dataset.nullable !== undefined;
  let v = inp.value;
  if (inp.tagName === 'SELECT') {
    setStatePath(path, v);
    // changing element type → adjust angle default & dims
    if (path.startsWith('elements.') && path.endsWith('.type')) {
      const name = path.split('.')[1];
      const e = state.elements[name];
      if (e) {
        e.angle = TYPE_DEFAULT_ANGLE[e.type];
        if (e.type === 'cable') {
          if (e.outer_diameter == null) e.outer_diameter = 25;
          if (e.inner_diameter == null) e.inner_diameter = 0;
        } else {
          if (e.width == null)  e.width  = 10;
          if (e.height == null) e.height = 40;
        }
      }
    }
    render();
    return;
  }
  if (inp.type === 'number') {
    if (v === '' || v === null) {
      if (nullable) {
        // erase value
        const parts = path.split('.');
        const key = parts[parts.length - 1];
        const parent = parts.slice(0, -1).reduce((o, k) => o[k], state);
        delete parent[key];
        renderRightAndYAML();
        return;
      } else {
        v = 0;
      }
    } else {
      v = parseFloat(v);
      if (!isFinite(v)) v = 0;
    }
  }
  setStatePath(path, v);
  renderRightAndYAML();
}

function onElementRename(ev) {
  const oldName = ev.currentTarget.dataset.rename;
  const newName = ev.currentTarget.value.trim();
  if (newName === oldName) return;
  if (!NAME_RE.test(newName)) {
    showToast('Invalid name. Use letters, digits, underscore (must start with a letter).');
    ev.currentTarget.value = oldName;
    return;
  }
  if (state.elements[newName]) {
    showToast(`Name "${newName}" already exists.`);
    ev.currentTarget.value = oldName;
    return;
  }
  // preserve order
  const newElements = {};
  Object.keys(state.elements).forEach(k => {
    if (k === oldName) newElements[newName] = state.elements[oldName];
    else newElements[k] = state.elements[k];
  });
  state.elements = newElements;
  // update segment references
  state.panels.forEach(p => {
    ['main_busbar', 'angle_bars', 'io_bars', 'breaker'].forEach(g => {
      (p[g] || []).forEach(r => { if (r.element === oldName) r.element = newName; });
    });
  });
  ui.selectedElement = newName;
  render();
}

function onSegSelChange(ev) {
  const [pIdx, key, rIdx] = ev.currentTarget.dataset.segsel.split('.');
  state.panels[+pIdx][key][+rIdx].element = ev.currentTarget.value;
  renderRightAndYAML();
}

function onSegInpChange(ev) {
  const [pIdx, key, rIdx, field] = ev.currentTarget.dataset.seginp.split('.');
  const nullable = ev.currentTarget.dataset.nullable !== undefined;
  let v = ev.currentTarget.value;
  if (v === '' || v === null) {
    if (nullable) {
      delete state.panels[+pIdx][key][+rIdx][field];
      renderRightAndYAML();
      return;
    } else {
      v = 0;
    }
  } else {
    v = parseFloat(v);
    if (!isFinite(v)) v = 0;
    if (field === 'count') v = Math.max(1, Math.round(v));
  }
  state.panels[+pIdx][key][+rIdx][field] = v;
  // refresh count display in segment header → re-render centre
  render();
}

function onSegRowDelete(ev) {
  const [pIdx, key, rIdx] = ev.currentTarget.dataset.segdel.split('.');
  state.panels[+pIdx][key].splice(+rIdx, 1);
  render();
}

function onSegRowAdd(ev) {
  const [pIdx, key] = ev.currentTarget.dataset.segadd.split('.');
  const firstElem = Object.keys(state.elements)[0] || '';
  state.panels[+pIdx][key].push({ element: firstElem, count: 1 });
  render();
}

function onSegAddSensor(ev) {
  const [pIdx, key] = ev.currentTarget.dataset.segaddsensor.split('.');
  const existing = (state.panels[+pIdx][key] || []).filter(r => r.sensor !== undefined).length;
  state.panels[+pIdx][key].push({ sensor: `sensor_${existing + 1}` });
  render();
}

function onSensorNameChange(ev) {
  const [pIdx, key, rIdx] = ev.currentTarget.dataset.sensname.split('.');
  state.panels[+pIdx][key][+rIdx].sensor = ev.currentTarget.value;
  renderRightAndYAML();
}

function moveSegRow(pIdx, key, rIdx, dir) {
  const arr = state.panels[+pIdx][key];
  if (!arr) return;
  const newIdx = rIdx + dir;
  if (newIdx < 0 || newIdx >= arr.length) return;
  [arr[rIdx], arr[newIdx]] = [arr[newIdx], arr[rIdx]];
  render();
}

/* MCC module segment handlers */
function _mccModSegRef(attr) {
  // attr = "pIdx.mIdx.grpKey.rIdx" or "pIdx.mIdx.grpKey.rIdx.field"
  const parts = attr.split('.');
  const [pIdx, mIdx, grpKey, rIdx] = parts;
  const mod = state.panels[+pIdx]?.modules?.[+mIdx];
  if (!mod) return null;
  if (!mod[grpKey]) mod[grpKey] = [];
  return { mod, grpKey, rIdx: +rIdx, field: parts[4] };
}

function onMSegSelChange(ev) {
  const ref = _mccModSegRef(ev.currentTarget.dataset.msegsel);
  if (!ref) return;
  ref.mod[ref.grpKey][ref.rIdx].element = ev.currentTarget.value;
  renderRightAndYAML();
}

function onMSegInpChange(ev) {
  const ref = _mccModSegRef(ev.currentTarget.dataset.mseginp);
  if (!ref) return;
  let v = parseFloat(ev.currentTarget.value);
  if (!isFinite(v)) v = 0;
  if (ref.field === 'count') v = Math.max(1, Math.round(v));
  ref.mod[ref.grpKey][ref.rIdx][ref.field] = v;
  render();
}

function onMSegRowDelete(ev) {
  const ref = _mccModSegRef(ev.currentTarget.dataset.msegdel);
  if (!ref) return;
  ref.mod[ref.grpKey].splice(ref.rIdx, 1);
  render();
}

function onMSegRowAdd(ev) {
  const parts = ev.currentTarget.dataset.msegadd.split('.');
  const [pIdx, mIdx, grpKey] = parts;
  const mod = state.panels[+pIdx]?.modules?.[+mIdx];
  if (!mod) return;
  if (!mod[grpKey]) mod[grpKey] = [];
  const firstElem = Object.keys(state.elements)[0] || '';
  mod[grpKey].push({ element: firstElem, count: 1 });
  render();
}

/* ─────────────────────────────────────────────────────
   Right panel — schematic + summary
   ───────────────────────────────────────────────────── */
function renderRight() {
  // schematic
  const svg = document.getElementById('schematic-svg');
  const meta = document.getElementById('schem-meta');
  const p = state.panels[ui.selectedPanel];
  if (!p) {
    svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" font-size="11" fill="#9ca3af">No panel selected</text>`;
    meta.textContent = '';
  } else {
    svg.innerHTML = panelSchematic(p);
    meta.textContent = `${p.height} mm tall`;
  }
  // bottom
  const rbT = document.getElementById('rb-title');
  const rbC = document.getElementById('rb-content');
  if (ui.section === 'elements' && ui.selectedElement && state.elements[ui.selectedElement]) {
    rbT.textContent = `Element — ${ui.selectedElement}`;
    rbC.innerHTML = renderElementMiniPreview(state.elements[ui.selectedElement]);
  } else {
    rbT.textContent = 'Lineup Summary';
    rbC.innerHTML = renderLineupSummary();
  }
}

function panelSchematic(p, panelIdx) {
  if (panelIdx === undefined) panelIdx = ui.selectedPanel;
  if ((p.type || 'DC2BB') === 'MCC') return mccSchematic(p, panelIdx);

  // Canvas
  const W = 240, H = 380;
  const margin = 16;
  const labelW = 32;   // left margin reserved for Y-axis labels
  const innerH = H - 2 * margin;
  const panelX = margin + labelW;
  const panelW = W - panelX - margin;
  const yTop = margin, yBottom = margin + innerH;

  // Geometry helpers
  const totalH = Math.max(p.height || 2100, 1);
  const scaleY = innerH / totalH;
  const yMm = mm => yBottom - mm * scaleY;
  const yMBB = yMm(Math.max(0, Math.min(p.mbb_height || 1500, totalH)));

  const colMbb = getComputedStyleVar('--col-mbb');
  const colAng = getComputedStyleVar('--col-angle');
  const colIo  = getComputedStyleVar('--col-io');
  const colBrk = getComputedStyleVar('--col-brk');

  // Sum element lengths through a segment list (used for MBB horizontal scale)
  function segTotLen(rows) {
    return (rows||[]).reduce((s, r) => {
      if (!r.element) return s;
      const e = state.elements[r.element];
      return s + (e?.length || 50) * (r.count || 1);
    }, 0);
  }
  // First real element in a group
  function firstE(rows) {
    for (const r of (rows||[])) if (r.element && state.elements[r.element]) return state.elements[r.element];
    return null;
  }
  // Cross-section height of an element [mm]
  function csH(e) {
    if (!e) return 20;
    return e.type === 'cable' ? (e.outer_diameter || 25) : (e.height || 40);
  }

  // ── MBB: horizontal bar ──────────────────────────────────────────────
  const mbbTotLen = segTotLen(p.main_busbar);
  const mbbPxH    = Math.max(4, Math.min(csH(firstE(p.main_busbar)) * scaleY * 0.7, 16));
  const mbbScX    = mbbTotLen > 0 ? (panelW - 6) / mbbTotLen : 0.05;

  function drawMBB() {
    let out = '', cumMm = 0;
    (p.main_busbar||[]).forEach(r => {
      if (r.sensor !== undefined) {
        const sx = panelX + 3 + cumMm * mbbScX;
        out += `<line x1="${sx.toFixed(1)}" y1="${(yMBB - mbbPxH - 5).toFixed(1)}" x2="${sx.toFixed(1)}" y2="${(yMBB + mbbPxH + 5).toFixed(1)}" stroke="#fcc138" stroke-width="1.5" stroke-dasharray="2,2"/>`;
        out += `<circle cx="${sx.toFixed(1)}" cy="${(yMBB - mbbPxH - 9).toFixed(1)}" r="2.5" fill="#fcc138" stroke="#92620a" stroke-width=".7"/>`;
        out += `<text x="${sx.toFixed(1)}" y="${(yMBB - mbbPxH - 14).toFixed(1)}" text-anchor="middle" font-size="6.5" fill="#fcc138">${r.sensor}</text>`;
        return;
      }
      const e = state.elements[r.element];
      if (!e) return;
      const pxW = (e.length||50) * (r.count||1) * mbbScX;
      const rx  = panelX + 3 + cumMm * mbbScX;
      out += `<rect x="${rx.toFixed(1)}" y="${(yMBB - mbbPxH/2).toFixed(1)}" width="${Math.max(1, pxW).toFixed(1)}" height="${mbbPxH.toFixed(1)}" fill="${colMbb}" fill-opacity=".9" stroke="${colMbb}" stroke-width=".6" rx="1"/>`;
      // segment label on longer sections
      if (pxW > 22) out += `<text x="${(rx + pxW/2).toFixed(1)}" y="${(yMBB + mbbPxH/2 + 7).toFixed(1)}" text-anchor="middle" font-size="6" fill="${colMbb}" opacity=".7">${r.element}</text>`;
      cumMm += (e.length||50) * (r.count||1);
    });
    return out;
  }

  // Visual line half-widths based on element cross-section
  const csScale = 0.85;
  const angHW = Math.max(3, Math.min(csH(firstE(p.angle_bars)) * csScale, 18));
  const brkHW = Math.max(5, Math.min(csH(firstE(p.breaker))    * csScale, 24));
  const ioHW  = Math.max(3, Math.min(csH(firstE(p.io_bars))    * csScale, 18));

  const cx = panelX + panelW / 2;

  // Draw element chain as directed line segments from the MBB connection point.
  // Each row advances the cursor by (length * count) in the row's angle direction.
  // angle convention: 0=horizontal, 90=up, -90=down (same as solver).
  // SVG Y increases downward, so dy_svg = -length * sin(angle) * scaleY.
  function drawChain() {
    let out = '';
    let px = cx, py = yMBB;
    const groups = [
      {rows: p.angle_bars, color: colAng, hw: angHW},
      {rows: p.breaker,    color: colBrk, hw: brkHW},
      {rows: p.io_bars,    color: colIo,  hw: ioHW},
    ];
    groups.forEach(({rows, color, hw}) => {
      const sw = Math.max(2, hw * 0.8);
      (rows||[]).forEach(r => {
        if (r.sensor !== undefined) {
          out += `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="3" fill="#fcc138" stroke="#92620a" stroke-width=".8"/>`;
          out += `<text x="${(px + 5).toFixed(1)}" y="${(py - 5).toFixed(1)}" font-size="6.5" fill="#fcc138">${r.sensor}</text>`;
          return;
        }
        const e = state.elements[r.element];
        if (!e) return;
        const deg = r.angle ?? e.angle ?? 0;
        const rad = deg * Math.PI / 180;
        const total_len = (e.length||50) * (r.count||1);
        const ex = px + total_len * Math.cos(rad) * scaleY;
        const ey = py - total_len * Math.sin(rad) * scaleY;
        out += `<line x1="${px.toFixed(1)}" y1="${py.toFixed(1)}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}" stroke="${color}" stroke-width="${sw.toFixed(1)}" stroke-linecap="round" stroke-opacity=".85"/>`;
        const seg_px = Math.hypot(ex - px, ey - py);
        if (seg_px > 20) {
          const mx = (px + ex) / 2, my = (py + ey) / 2;
          out += `<text x="${(mx + sw + 3).toFixed(1)}" y="${(my + 3).toFixed(1)}" font-size="6" fill="${color}" opacity=".8">${r.element}×${r.count||1}</text>`;
        }
        px = ex; py = ey;
      });
    });
    return {svg: out, endX: px, endY: py};
  }
  const {svg: chainSVG, endX: chainEndX, endY: chainEndY} = drawChain();

  // ── Y-axis ticks ─────────────────────────────────────────────────────
  function yAxis() {
    const step = totalH > 2500 ? 500 : 250;
    let out = '';
    for (let h = 0; h <= totalH; h += step) {
      const ty = yMm(h);
      out += `<line x1="${panelX - 3}" y1="${ty.toFixed(1)}" x2="${panelX}" y2="${ty.toFixed(1)}" stroke="#6b7280" stroke-width=".8"/>`;
      out += `<text x="${(panelX - 5).toFixed(1)}" y="${(ty + 3.5).toFixed(1)}" text-anchor="end" font-size="7.5" fill="#9ca3af">${h}</text>`;
    }
    // MBB tick
    out += `<line x1="${panelX - 5}" y1="${yMBB.toFixed(1)}" x2="${panelX}" y2="${yMBB.toFixed(1)}" stroke="${colMbb}" stroke-width="1.2"/>`;
    return out;
  }

  // ── Load indicator ────────────────────────────────────────────────────
  const yLoad = Math.min(chainEndY, yBottom - 4) + 2;
  const loadAbs  = Math.abs(p.load || 0);
  const loadSign = (p.load || 0) >= 0 ? '+' : '−';
  const triPts   = `${chainEndX-7},${yLoad} ${chainEndX+7},${yLoad} ${chainEndX},${yLoad+11}`;

  const gradId = `pg-${panelIdx ?? 0}`;
  return `
    <defs>
      <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1e293b" stop-opacity=".06"/>
        <stop offset="100%" stop-color="#1e293b" stop-opacity=".01"/>
      </linearGradient>
    </defs>

    <!-- enclosure -->
    <rect x="${panelX}" y="${yTop}" width="${panelW}" height="${innerH}"
          fill="url(#${gradId})" stroke="#94a3b8" stroke-width="1" rx="2"/>

    <!-- Y axis -->
    ${yAxis()}

    <!-- MBB -->
    ${drawMBB()}
    <text x="${panelX + panelW - 3}" y="${(yMBB - mbbPxH/2 - 3).toFixed(1)}" text-anchor="end"
          font-size="8" fill="${colMbb}" font-weight="600">MBB ${Math.round(p.mbb_height)} mm</text>

    <!-- element chain -->
    ${chainSVG}

    <!-- load -->
    ${yLoad < yBottom ? `
    <polygon points="${triPts}" fill="#f97316" stroke="#c2410c" stroke-width=".8"/>
    <text x="${chainEndX}" y="${yLoad + 22}" text-anchor="middle" font-size="9" fill="#374151" font-weight="600">${loadSign}${loadAbs} A</text>` : ''}

    <!-- panel label -->
    <text x="${panelX + 4}" y="${yTop + 11}" font-size="8.5" fill="#6b7280">P${(panelIdx??0)+1}${p.T0 != null ? ` T₀=${p.T0}°C` : ''}</text>
    <text x="${panelX + panelW - 3}" y="${yBottom - 3}" text-anchor="end" font-size="7.5" fill="#9ca3af">${p.height} mm</text>
  `;
}

function mccSchematic(p, panelIdx) {
  const W = 240, H = 380;
  const margin = 18;
  const innerH = H - 2 * margin;
  const panelX = margin + 30;
  const panelW = W - 2 * margin - 60;
  const yTop = margin, yBottom = margin + innerH;
  const panelHeight = Math.max(p.height || 2000, 1);
  const scaleY = innerH / panelHeight;
  const gradId = `panel-grad-${panelIdx}`;
  const colMbb = getComputedStyleVar('--col-mbb');
  const dbbColor = '#0ea5e9';
  const brkColor = getComputedStyleVar('--col-brk');

  // MBB junction: position from bottom
  const mbbH = Math.min(p.mbb_height || 2000, panelHeight);
  const yJunction = yBottom - mbbH * scaleY;

  // DBB: full vertical bar from bottom (y=yBottom) to top (y=yTop+margin/2)
  const dbbX = panelX + 14;
  const dbbLen = p.dbb_length || 1900;
  const yDbbTop = yBottom - dbbLen * scaleY;
  const yDbbTopClamped = Math.max(yTop + 4, yDbbTop);

  // Modules: stacked from bottom, each at their cumulative center
  const modules = p.modules || [];
  let cumY = 0;
  const moduleLines = modules.map((m, i) => {
    const modH = Math.max(m.height ?? 200, 25);
    const centerMM = cumY + modH / 2;
    cumY += modH;
    const yMod = yBottom - centerMM * scaleY;
    const loadAbs = Math.abs(m.load || 0);
    const loadSign = (m.load || 0) >= 0 ? '+' : '−';
    const hasDevice = (m.device || []).length > 0;
    const barRight = dbbX + 52;
    return `
      <line x1="${dbbX + 3}" y1="${yMod.toFixed(1)}" x2="${barRight}" y2="${yMod.toFixed(1)}" stroke="${dbbColor}" stroke-width="1.5"/>
      ${hasDevice ? `<rect x="${barRight}" y="${(yMod - 4.5).toFixed(1)}" width="11" height="9" fill="${brkColor}22" stroke="${brkColor}" stroke-width="1" rx="1"/>` : ''}
      <text x="${barRight + 14}" y="${(yMod + 3).toFixed(1)}" font-size="8" fill="#374151">${loadSign}${loadAbs}A</text>
      <text x="${barRight + 14}" y="${(yMod - 4).toFixed(1)}" font-size="7" fill="#9ca3af">h=${modH}</text>
    `;
  }).join('');

  // MBB junction marker (diamond) on DBB
  const jx = dbbX, jy = yJunction;
  const junctionMarker = `<polygon points="${jx},${(jy - 5).toFixed(1)} ${(jx + 4).toFixed(1)},${jy.toFixed(1)} ${jx},${(jy + 5).toFixed(1)} ${(jx - 4).toFixed(1)},${jy.toFixed(1)}" fill="${colMbb}" stroke="none"/>`;

  return `
    <defs>
      <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1e293b" stop-opacity=".08"/>
        <stop offset="100%" stop-color="#1e293b" stop-opacity=".02"/>
      </linearGradient>
    </defs>
    <!-- enclosure -->
    <rect x="${panelX}" y="${yTop}" width="${panelW}" height="${innerH}" fill="url(#${gradId})" stroke="#1e293b" stroke-width="1.2" rx="3"/>
    <!-- DBB: full vertical bar bottom-to-top -->
    <rect x="${(dbbX - 3).toFixed(1)}" y="${yDbbTopClamped.toFixed(1)}" width="6" height="${(yBottom - yDbbTopClamped).toFixed(1)}" fill="${dbbColor}" rx="1"/>
    <!-- MBB horizontal at junction height -->
    <rect x="${panelX + 6}" y="${(yJunction - 4).toFixed(1)}" width="${panelW - 12}" height="8" fill="${colMbb}" rx="2"/>
    <!-- junction diamond where MBB meets DBB -->
    ${junctionMarker}
    <!-- module taps -->
    ${moduleLines}
    <!-- labels -->
    <text x="${panelX + 4}" y="${yTop + 12}" font-size="9" fill="#6b7280">Panel ${panelIdx + 1} · MCC${p.T0 != null ? ` · T₀=${p.T0}°C` : ''}</text>
    <text x="${panelX + panelW - 6}" y="${(yJunction - 7).toFixed(1)}" text-anchor="end" font-size="9" fill="${colMbb}" font-weight="700">MBB ${Math.round(mbbH)} mm</text>
    <text x="${dbbX + 8}" y="${(yDbbTopClamped - 3).toFixed(1)}" font-size="8" fill="${dbbColor}">DBB ${Math.round(dbbLen)} mm</text>
    <text x="${panelX + 4}" y="${yBottom - 4}" font-size="9" fill="#6b7280">${panelHeight} mm</text>
  `;
}

function renderElementMiniPreview(e) {
  const mat = MATERIALS[e.material] || state.materials[e.material] || {};
  const dims = e.type === 'cable'
    ? `⌀${fmtNum(e.outer_diameter)} mm${e.inner_diameter ? ` (inner ⌀${fmtNum(e.inner_diameter)})` : ''}`
    : `${fmtNum(e.width)} × ${fmtNum(e.height)} mm`;
  return `
    <div class="shape-preview" style="min-height:90px">${elementShapeSVG(e)}</div>
    <div style="margin-top:8px; padding:8px; background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius); font-size:11px; line-height:1.6;">
      <div><b>${escapeHtml(e.type)}</b> · ${escapeHtml(e.material)} — ${escapeHtml(mat.name || '')}</div>
      <div style="color:var(--text2)">Cross-section: ${dims}</div>
      <div style="color:var(--text2)">Length: ${fmtNum(e.length)} mm · n=${e.n}</div>
      <div style="color:var(--text2)">σ = ${(mat.sigma/1e6 || 0).toFixed(1)} MS/m · α = ${(mat.alpha || 0).toExponential(2)} 1/K</div>
    </div>
  `;
}

function renderLineupSummary() {
  const nPanels = state.panels.length;
  const nElems  = Object.keys(state.elements).length;
  let nodes = 0;
  state.panels.forEach(p => {
    const grps = p.type === 'MCC'
      ? ['main_busbar']
      : ['main_busbar', 'angle_bars', 'io_bars', 'breaker'];
    grps.forEach(g => {
      (p[g] || []).forEach(r => {
        const e = state.elements[r.element];
        nodes += (r.count || 0) * (e ? (e.n || 1) : 1);
      });
    });
    if (p.type === 'MCC') {
      (p.modules || []).forEach(m => {
        ['incoming_bars', 'device', 'outgoing'].forEach(g => {
          (m[g] || []).forEach(r => {
            const e = state.elements[r.element];
            nodes += (r.count || 0) * (e ? (e.n || 1) : 1);
          });
        });
      });
    }
  });
  return `
    <div class="summary-stats">
      <div class="stat-box"><div class="stat-val">${nPanels}</div><div class="stat-lbl">Panels</div></div>
      <div class="stat-box"><div class="stat-val">${nElems}</div><div class="stat-lbl">Elements</div></div>
      <div class="stat-box"><div class="stat-val">${nodes}</div><div class="stat-lbl">Node count (est.)</div></div>
      <div class="stat-box"><div class="stat-val">${(state.solver.end_time/3600).toFixed(1)} h</div><div class="stat-lbl">Sim duration</div></div>
    </div>
  `;
}

/* ─────────────────────────────────────────────────────
   YAML output & status
   ───────────────────────────────────────────────────── */
function renderYAML() {
  const valid = validate();
  const out = document.getElementById('yaml-out');
  const status = document.getElementById('status-bar');
  if (valid) {
    out.value = generateYAML();
    out.classList.remove('invalid');
    status.textContent = `OK · ${Object.keys(state.elements).length} elements · ${state.panels.length} panels`;
    status.className = 'tb-status ok';
  } else {
    out.value = `# ⚠ ${ui.errors.length} validation error(s):\n` +
                ui.errors.map(e => `# - ${e}`).join('\n') +
                `\n\n# (YAML output disabled until errors are fixed)`;
    out.classList.add('invalid');
    status.textContent = `${ui.errors.length} error(s)`;
    status.className = 'tb-status error';
  }
}

function renderRightAndYAML() { renderRight(); renderYAML(); }

/* ─────────────────────────────────────────────────────
   Full render
   ───────────────────────────────────────────────────── */
function render() {
  renderLeft();
  renderCentre();
  renderRight();
  renderYAML();
}

/* ─────────────────────────────────────────────────────
   Add / new buttons
   ───────────────────────────────────────────────────── */
function addElement() {
  let base = 'NEW_ELEM';
  let name = base;
  let i = 1;
  while (state.elements[name]) { name = `${base}_${i++}`; }
  state.elements[name] = {
    type: 'busbar', material: 'Cu',
    width: 10, height: 40, length: 50,
    n: 1, angle: TYPE_DEFAULT_ANGLE.busbar
  };
  ui.selectedElement = name;
  render();
}

function addMaterial() {
  let n = 1;
  while (state.materials[`MAT${n}`] || MATERIALS[`MAT${n}`]) n++;
  const name = `MAT${n}`;
  state.materials[name] = { sigma: 58e6, alpha: 3.9e-3, k: 401, density: 8920, Cp: 385 };
  ui.selectedMaterial = name;
  render();
}

function onMaterialRename(ev) {
  const oldName = ui.selectedMaterial;
  const newName = ev.currentTarget.value.trim();
  if (!newName || newName === oldName) { render(); return; }
  if (!NAME_RE.test(newName)) {
    showToast(`Invalid material key: "${newName}"`);
    render(); return;
  }
  if (state.materials[newName] || MATERIALS[newName]) {
    showToast(`Material "${newName}" already exists`);
    render(); return;
  }
  state.materials[newName] = state.materials[oldName];
  delete state.materials[oldName];
  // update references in elements
  Object.values(state.elements).forEach(e => {
    if (e.material === oldName) e.material = newName;
  });
  ui.selectedMaterial = newName;
  render();
}

function onMatBindInput(ev) {
  const parts = ev.currentTarget.dataset.matbind.split('.');
  const matName = parts[0];
  const field = parts[1];
  const v = parseFloat(ev.currentTarget.value);
  if (!isFinite(v) || v <= 0) return;
  if (state.materials[matName]) {
    state.materials[matName][field] = v;
    renderYAML();
  }
}

function movePanelUp(idx) {
  if (idx <= 0) return;
  [state.panels[idx - 1], state.panels[idx]] = [state.panels[idx], state.panels[idx - 1]];
  ui.selectedPanel = idx - 1;
  render();
}

function movePanelDown(idx) {
  if (idx >= state.panels.length - 1) return;
  [state.panels[idx], state.panels[idx + 1]] = [state.panels[idx + 1], state.panels[idx]];
  ui.selectedPanel = idx + 1;
  render();
}

function addPanel() {
  const base = state.panels[state.panels.length - 1];
  const fresh = base ? deepCopy(base) : {
    type: 'DC2BB', height: 2100, mbb_height: 1250, load: 0, T0: null,
    ventilation: 'closed', panel_depth: 600,
    main_busbar: [], angle_bars: [], io_bars: [], breaker: []
  };
  fresh.load = 0;
  state.panels.push(fresh);
  ui.selectedPanel = state.panels.length - 1;
  render();
}

/* ─────────────────────────────────────────────────────
   File I/O
   ───────────────────────────────────────────────────── */
function downloadYAML() {
  const valid = validate();
  if (!valid) {
    showToast('Fix validation errors before downloading.');
    return;
  }
  const blob = new Blob([generateYAML()], { type: 'text/yaml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'lineup.yaml';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('Downloaded lineup.yaml');
}

function copyYAML() {
  const valid = validate();
  if (!valid) { showToast('Fix validation errors first.'); return; }
  const text = generateYAML();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('✓ Copied!'), () => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('✓ Copied!'); }
  catch (_) { showToast('Copy failed'); }
  document.body.removeChild(ta);
}

function openLoadDialog() {
  document.getElementById('file-input').click();
}
function handleFileLoad(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const ok = loadFromYAMLText(e.target.result);
    if (ok) { showToast(`Loaded ${file.name}`); render(); }
    else { showToast('YAML parse failed — see console'); }
  };
  reader.readAsText(file);
  ev.target.value = ''; // allow re-loading the same file
}

/* ─────────────────────────────────────────────────────
   Toast
   ───────────────────────────────────────────────────── */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ─────────────────────────────────────────────────────
   Helpers
   ───────────────────────────────────────────────────── */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

/* ─────────────────────────────────────────────────────
   Lineup View — modal showing all panels side by side
   ───────────────────────────────────────────────────── */
function lineupSchematic() {
  const panels = state.panels;
  if (panels.length === 0) {
    return `<svg viewBox="0 0 300 100" width="300" height="100">
      <text x="150" y="55" text-anchor="middle" font-size="13" fill="#9ca3af">No panels defined yet.</text>
    </svg>`;
  }

  const colW = 240;     // SVG units per panel column (matches panelSchematic's W)
  const colH = 380;
  const gap  = 12;
  const totalW = panels.length * colW + (panels.length + 1) * gap;

  // Build one nested <svg> per panel — each reuses panelSchematic's coordinate space
  const cells = panels.map((p, i) => {
    const x = gap + i * (colW + gap);
    return `<svg x="${x}" y="0" width="${colW}" height="${colH}" viewBox="0 0 ${colW} ${colH}" overflow="visible">${panelSchematic(p, i)}</svg>`;
  }).join('');

  // Pixel size for display — scale down so it fits nicely in the modal
  const displayH = Math.min(480, window.innerHeight * 0.55);
  const displayW = Math.round(displayH * totalW / colH);

  return `<svg viewBox="0 0 ${totalW} ${colH}" width="${displayW}" height="${displayH}"
    style="display:block; max-width:100%; overflow:visible">${cells}</svg>`;
}

function showLineupView() {
  let existing = document.getElementById('lineup-modal');
  if (existing) { existing.remove(); }

  const modal = document.createElement('div');
  modal.id = 'lineup-modal';
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-box" style="max-width:92vw; min-width:360px;">
      <div class="modal-hdr">
        <span>Lineup View — ${state.panels.length} panel${state.panels.length !== 1 ? 's' : ''}</span>
        <button class="close" onclick="document.getElementById('lineup-modal').remove()">×</button>
      </div>
      <div class="modal-body" style="overflow-x:auto; overflow-y:auto; padding:16px 20px;">
        <div id="lineup-svg-wrap" style="min-width:max-content">${lineupSchematic()}</div>
        <div style="margin-top:12px; font-size:11px; color:var(--text3); display:flex; gap:16px; flex-wrap:wrap;">
          <span><span style="display:inline-block;width:10px;height:10px;background:var(--col-mbb);border-radius:2px;margin-right:4px;vertical-align:middle"></span>Main Busbar</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:var(--col-angle);border-radius:2px;margin-right:4px;vertical-align:middle"></span>Angle Bars</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:var(--col-brk);border-radius:2px;margin-right:4px;vertical-align:middle"></span>Breaker</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:var(--col-io);border-radius:2px;margin-right:4px;vertical-align:middle"></span>I/O Bars</span>
          <span style="margin-left:auto; color:var(--text3)">Bar rectangles = actual cross-section proportions</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="tb-btn" onclick="exportLineupSVG()">Export SVG</button>
        <button class="tb-btn" onclick="document.getElementById('lineup-modal').remove()">Close</button>
      </div>
    </div>
  `;
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  document.body.appendChild(modal);
}

function exportLineupSVG() {
  const wrap = document.getElementById('lineup-svg-wrap');
  if (!wrap) return;
  const svgEl = wrap.querySelector('svg');
  if (!svgEl) return;
  const blob = new Blob([svgEl.outerHTML], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'lineup.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('Downloaded lineup.svg');
}

/* ─────────────────────────────────────────────────────
   Wiring
   ───────────────────────────────────────────────────── */
document.querySelectorAll('.nav-tab').forEach(t => {
  t.addEventListener('click', () => {
    ui.section = t.dataset.section;
    ui.showOverrides = false;
    render();
  });
});

document.getElementById('add-btn').addEventListener('click', () => {
  if (ui.section === 'elements') addElement();
  else if (ui.section === 'panels') addPanel();
  else if (ui.section === 'materials') addMaterial();
});

document.getElementById('btn-lineup').addEventListener('click', showLineupView);

document.getElementById('btn-new').addEventListener('click', () => {
  if (confirm('Discard current lineup and start fresh?')) {
    clearLineup();
    render();
  }
});
document.getElementById('btn-example').addEventListener('click', () => {
  if (confirm('Replace current lineup with the bundled example?')) {
    loadExample();
    ui.section = 'elements';
    render();
  }
});
document.getElementById('btn-load').addEventListener('click', openLoadDialog);
document.getElementById('file-input').addEventListener('change', handleFileLoad);
document.getElementById('btn-download').addEventListener('click', downloadYAML);
document.getElementById('btn-copy').addEventListener('click', copyYAML);
document.getElementById('btn-dl-yaml').addEventListener('click', downloadYAML);

/* boot */
loadExample();
render();
</script>
</body>
</html>
