<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TnT-3 Lineup Editor</title>
<style>
:root {
  --bg:       #f0f2f5;
  --panel:    #ffffff;
  --panel2:   #f5f7fa;
  --border:   #d1d5db;
  --accent:   #0078d4;
  --accent2:  #106ebe;
  --danger:   #dc2626;
  --success:  #27ae60;
  --text:     #111827;
  --text2:    #6b7280;
  --text3:    #9ca3af;
  --input:    #f5f7fa;
  --hover:    #e4e7ec;
  --sel:      #dce8f5;
  --radius:   6px;

  /* segment group colours */
  --col-mbb:    #d97706;  /* amber */
  --col-angle:  #2563eb;  /* blue */
  --col-io:     #059669;  /* green */
  --col-brk:    #7c3aed;  /* purple */
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: grid;
  grid-template-rows: 46px 1fr 210px;
  grid-template-columns: 250px 1fr 310px;
  grid-template-areas:
    "tb tb tb"
    "lp cv rp"
    "pv pv pv";
  overflow: hidden;
}

/* ── Toolbar ─────────────────────────────────────── */
#toolbar {
  grid-area: tb;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.app-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .5px;
  color: var(--accent);
  margin-right: 8px;
  white-space: nowrap;
}
.tb-sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
.tb-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--input);
  color: var(--text2);
  cursor: pointer;
  font-size: 12px;
  transition: all .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.tb-btn:hover { background: var(--hover); color: var(--text); border-color: var(--accent); }
.tb-btn.active { background: var(--accent); border-color: var(--accent2); color: #fff; }
.tb-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
.tb-status {
  margin-left: auto;
  font-size: 11px;
  color: var(--text3);
  font-family: monospace;
  white-space: nowrap;
}
.tb-status.error { color: var(--danger); }
.tb-status.ok { color: var(--success); }

/* ── Left panel ──────────────────────────────────── */
#left-panel {
  grid-area: lp;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.nav-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  padding: 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.nav-tab {
  padding: 7px 6px;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--input);
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.nav-tab:hover { background: var(--hover); color: var(--text); }
.nav-tab.active { background: var(--accent); border-color: var(--accent2); color: #fff; }

.panel-hdr {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text3);
  padding: 10px 12px 6px;
  flex-shrink: 0;
}

#item-list { flex: 1; overflow-y: auto; }
.item-row {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 10px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background .12s, border-color .12s;
  position: relative;
}
.item-row:hover { background: var(--hover); }
.item-row.active { background: var(--sel); border-left-color: var(--accent); }
.item-name { flex: 1; font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-badge {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  padding: 2px 6px;
  border-radius: 3px;
  color: #fff;
}
.item-badge.busbar  { background: var(--col-angle); }
.item-badge.breaker { background: var(--col-brk); }
.item-badge.cable   { background: var(--col-io); }
.item-load {
  font-size: 10px;
  font-family: monospace;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--text2);
  background: var(--panel2);
}
.item-load.pos { color: var(--success); }
.item-load.neg { color: var(--accent); }
.item-del {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 14px; line-height: 1;
  padding: 0 2px; opacity: 0; transition: opacity .12s;
}
.item-row:hover .item-del { opacity: 1; }
.item-del:hover { color: var(--danger); }
.item-move {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 11px; line-height: 1;
  padding: 0 1px; opacity: 0; transition: opacity .12s;
}
.item-row:hover .item-move { opacity: 1; }
.item-move:hover:not(:disabled) { color: var(--accent); }
.item-move:disabled { opacity: 0.2 !important; cursor: default; }
.mod-move {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 11px; line-height: 1;
  padding: 0 2px; border-radius: 3px;
}
.mod-move:hover:not(:disabled) { color: var(--accent); background: var(--hover); }
.mod-move:disabled { opacity: 0.3; cursor: default; }

#add-btn {
  margin: 8px 10px;
  padding: 7px; flex-shrink: 0;
  background: none; border: 1px dashed var(--border);
  border-radius: var(--radius); color: var(--text3);
  cursor: pointer; font-size: 12px; text-align: center;
  transition: all .15s;
}
#add-btn:hover { border-color: var(--accent); color: var(--text); }

.left-hint {
  padding: 18px 14px;
  font-size: 11px;
  color: var(--text3);
  line-height: 1.6;
  text-align: center;
  font-style: italic;
}

/* ── Centre panel ────────────────────────────────── */
#centre-panel {
  grid-area: cv;
  overflow-y: auto;
  background: var(--bg);
  padding: 16px;
}

.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: 0 1px 2px rgba(0,0,0,.04);
}
.card-hdr {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text3);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.card-hint {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 10px;
  line-height: 1.5;
}

/* Property fields */
.prop-block { padding: 0; }
.prop-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
.prop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.prop-grid.cols1 { grid-template-columns: 1fr; }
.prop-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
.prop-grid.cols4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.prop-field { display: flex; flex-direction: column; gap: 3px; }
.prop-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; }
.prop-lbl .u { text-transform: none; letter-spacing: 0; color: var(--text2); font-weight: 600; }
.prop-inp, .prop-sel {
  background: var(--input); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text);
  padding: 6px 8px; font-size: 12px; width: 100%;
  font-family: inherit;
}
.prop-inp:focus, .prop-sel:focus { outline: none; border-color: var(--accent); }
.prop-inp.error { border-color: var(--danger); background: #fee; }
.prop-err {
  font-size: 10px; color: var(--danger); margin-top: 2px;
}
.prop-help {
  font-size: 10px; color: var(--text3); margin-top: 2px;
  line-height: 1.4;
}

.toggle-btn {
  background: none;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 6px 10px;
  color: var(--text3);
  cursor: pointer;
  font-size: 11px;
  transition: all .15s;
  width: 100%;
}
.toggle-btn:hover { border-color: var(--accent); color: var(--text); }

.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
  line-height: 1.7;
}
.empty-state .icon {
  font-size: 32px;
  display: block;
  margin-bottom: 10px;
  color: var(--text3);
}

/* element shape preview inside form */
.shape-preview {
  padding: 14px;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  min-height: 130px;
}
.shape-preview svg { max-width: 100%; }

/* segment group cards */
.seg-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.seg-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-left: 4px solid var(--col-angle);
  border-radius: var(--radius);
  padding: 12px;
}
.seg-card.mbb   { border-left-color: var(--col-mbb); }
.seg-card.angle { border-left-color: var(--col-angle); }
.seg-card.io    { border-left-color: var(--col-io); }
.seg-card.brk   { border-left-color: var(--col-brk); }
.seg-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.seg-title {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .8px;
  color: var(--text);
}
.seg-count {
  font-size: 10px;
  color: var(--text3);
  font-family: monospace;
}
.seg-table { width: 100%; }
.seg-row {
  display: grid;
  grid-template-columns: 1.5fr 60px 70px 16px 16px 22px;
  gap: 4px;
  margin-bottom: 4px;
  align-items: center;
}
.seg-row .prop-sel, .seg-row .prop-inp {
  padding: 4px 5px;
  font-size: 11px;
}
.seg-row .row-del {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 14px; line-height: 1; padding: 2px;
  border-radius: 3px;
}
.seg-row .row-del:hover { color: var(--danger); background: var(--hover); }
.seg-row .row-move {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 10px; line-height: 1; padding: 2px;
  border-radius: 3px;
}
.seg-row .row-move:hover { background: var(--hover); color: var(--text); }
.seg-row .row-move:disabled { opacity: 0.2; cursor: default; }
.seg-add {
  margin-top: 6px;
  padding: 4px 6px;
  background: none;
  border: 1px dashed var(--border);
  border-radius: 4px;
  color: var(--text3);
  cursor: pointer;
  font-size: 11px;
  width: 100%;
  transition: all .15s;
}
.seg-add:hover { border-color: var(--accent); color: var(--text); }
.seg-btn-row { display: flex; gap: 4px; margin-top: 6px; }
.seg-btn-row .seg-add { margin-top: 0; }
.seg-add-sensor { border-color: #fcc138; color: #92620a; }
.seg-add-sensor:hover { border-color: #fcc138; background: #fef3c7; color: #78350f; }
.seg-row-sensor {
  display: grid;
  grid-template-columns: 18px 1fr 16px 16px 22px;
  gap: 4px;
  margin-bottom: 4px;
  align-items: center;
  background: #fefce8;
  border-radius: 4px;
  padding: 2px 4px;
}
.sensor-dot { color: #fcc138; font-size: 14px; text-align: center; line-height: 1; }
.sensor-name-inp { font-family: monospace; font-size: 11px; font-weight: 600; color: #92620a; }
.seg-row-hdr {
  display: grid;
  grid-template-columns: 1.5fr 60px 70px 16px 16px 22px;
  gap: 4px;
  font-size: 9px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 4px;
}

/* ── MCC module cards ────────────────────────────── */
.mcc-modules { display: flex; flex-direction: column; gap: 8px; }
.mcc-mod-card {
  border: 1px solid var(--border);
  border-left: 4px solid #0ea5e9;
  border-radius: var(--radius);
  background: var(--panel2);
  padding: 10px;
}
.mcc-mod-hdr {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; margin-bottom: 8px;
}
.mcc-mod-hdr .mod-num { color: var(--text); flex-shrink: 0; }
.mcc-mod-hdr .mod-load-lbl { color: var(--text3); font-weight: 400; }
.mcc-mod-hdr .mod-load-inp { width: 70px; }
.mcc-mod-hdr .mod-del { margin-left: auto; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 0 4px; border-radius: 3px; }
.mcc-mod-hdr .mod-del:hover { color: var(--danger); background: var(--hover); }
.mcc-seg-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.mcc-seg-mini {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px;
}
.mcc-seg-mini-hdr {
  font-size: 9px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: .7px;
  margin-bottom: 5px;
}
.mcc-seg-mini .seg-row { grid-template-columns: 1.4fr 50px 18px; }
.mcc-add-mod {
  margin-top: 8px; padding: 6px;
  background: none; border: 1px dashed var(--border);
  border-radius: 4px; color: var(--text3); cursor: pointer;
  font-size: 11px; width: 100%;
}
.mcc-add-mod:hover { border-color: #0ea5e9; color: var(--text); }
.panel-type-sel {
  font-size: 11px; padding: 3px 6px;
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--input); color: var(--text); cursor: pointer;
}

/* ── Right panel ─────────────────────────────────── */
#right-panel {
  grid-area: rp;
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#right-top {
  flex: 1.6;
  overflow: auto;
  padding: 10px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column;
}
#right-bottom {
  flex: 1;
  overflow: auto;
  padding: 10px;
}
.right-hdr {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text3);
  margin-bottom: 8px;
  display: flex; align-items: center; justify-content: space-between;
}
.right-hdr .meta {
  font-size: 10px; font-weight: 400;
  text-transform: none; letter-spacing: 0;
  color: var(--text2);
  font-family: monospace;
}
#schematic-svg {
  flex: 1;
  width: 100%;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.summary-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.stat-box {
  padding: 10px;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-align: center;
}
.stat-val {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  font-family: monospace;
}
.stat-lbl {
  font-size: 9px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-top: 2px;
}

/* ── Bottom panel (YAML) ─────────────────────────── */
#yaml-panel {
  grid-area: pv;
  display: flex; flex-direction: column;
  background: var(--panel); border-top: 1px solid var(--border);
}
#yaml-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#yaml-hdr .pv-title {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text3); flex: 1;
}
.pv-btn {
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--input);
  color: var(--text2);
  cursor: pointer;
  font-size: 11px;
  transition: all .15s;
}
.pv-btn:hover { border-color: var(--accent); color: var(--text); }
.pv-btn.primary { background: var(--accent); border-color: var(--accent2); color: #fff; }
.pv-btn.primary:hover { opacity: .85; }
#yaml-out {
  flex: 1;
  font-family: 'Consolas','Courier New',monospace;
  font-size: 11px;
  color: #0369a1;
  background: var(--panel2);
  border: none;
  resize: none;
  padding: 8px 12px;
  overflow: auto;
  white-space: pre;
  outline: none;
  border-top: 1px solid var(--border);
}
#yaml-out.invalid { background: #fff5f5; color: var(--danger); }

/* ── Scrollbars ──────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ── Modals ──────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.55);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.modal-box {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; min-width: 400px; max-width: 90vw;
  max-height: 80vh; display: flex; flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.modal-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: 13px;
}
.modal-hdr button.close {
  background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 16px; line-height: 1; padding: 2px 6px; border-radius: 4px;
}
.modal-hdr button.close:hover { background: var(--panel2); color: var(--text); }
.modal-body { flex: 1; overflow-y: auto; padding: 14px; }
.modal-footer {
  padding: 8px 14px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}

/* ── Toast ──────────────────────────────────────── */
#toast {
  position: fixed; bottom: 220px; right: 20px;
  background: var(--text); color: #fff;
  padding: 8px 16px; border-radius: var(--radius);
  font-size: 12px;
  opacity: 0; transform: translateY(8px);
  transition: all .2s;
  pointer-events: none;
  z-index: 2000;
}
#toast.show { opacity: 1; transform: translateY(0); }

[title] { position: relative; }
</style>
</head>
<body>

<div id="toolbar">
  <div class="app-title">TnT-3 Lineup Editor</div>
  <button class="tb-btn" id="btn-new" title="Start a fresh empty lineup">New</button>
  <button class="tb-btn" id="btn-example" title="Load the bundled starter example">Example</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-lineup" title="See all panels side by side">Lineup View</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-load" title="Load a YAML lineup file from disk">Load YAML…</button>
  <button class="tb-btn" id="btn-download" title="Download the current YAML as lineup.yaml">Download</button>
  <input type="file" id="file-input" accept=".yaml,.yml,text/yaml" style="display:none">
  <div class="tb-status" id="status-bar">Ready</div>
</div>

<div id="left-panel">
  <div class="nav-tabs">
    <button class="nav-tab" data-section="defaults">Defaults</button>
    <button class="nav-tab" data-section="materials">Materials</button>
    <button class="nav-tab active" data-section="elements">Elements</button>
    <button class="nav-tab" data-section="panels">Panels</button>
    <button class="nav-tab" data-section="solver">Solver</button>
  </div>
  <div class="panel-hdr" id="left-hdr">Element Library</div>
  <div id="item-list"></div>
  <button id="add-btn">+ Add Element</button>
</div>

<div id="centre-panel"></div>

<div id="right-panel">
  <div id="right-top">
    <div class="right-hdr">
      <span>Panel Schematic</span>
      <span class="meta" id="schem-meta"></span>
      <button class="pv-btn" onclick="renderRight()" title="Refresh schematic" style="padding:1px 7px;font-size:13px;line-height:1.4">⟳</button>
    </div>
    <svg id="schematic-svg" viewBox="0 0 240 380" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <div id="right-bottom">
    <div class="right-hdr"><span id="rb-title">Lineup Summary</span></div>
    <div id="rb-content"></div>
  </div>
</div>

<div id="yaml-panel">
  <div id="yaml-hdr">
    <span class="pv-title">YAML Output</span>
    <button class="pv-btn" id="btn-copy">Copy</button>
    <button class="pv-btn primary" id="btn-dl-yaml">Download</button>
  </div>
  <textarea id="yaml-out" readonly spellcheck="false"></textarea>
</div>

<div id="toast"></div>

<script>
'use strict';

/* ─────────────────────────────────────────────────────
   Materials (built-in)
   ───────────────────────────────────────────────────── */
const MATERIALS = {
  Cu:    { name: 'Copper',        sigma: 58e6, alpha: 3.9e-3, note: 'Standard busbar copper' },
  CuACB: { name: 'Copper (ACB)',  sigma: 40e6, alpha: 3.9e-3, note: 'ACB contacts with elevated resistance' },
  Al:    { name: 'Aluminium',     sigma: 35e6, alpha: 4.0e-3, note: 'Aluminium busbar' },
  Steel: { name: 'Steel',         sigma: 7e6,  alpha: 5.0e-3, note: 'Steel enclosure / supports' },
};

const TYPE_DEFAULT_ANGLE = { busbar: 0, breaker: -90, cable: -90 };
const MBB_HEIGHT_DEFAULT = 1500;

/* ─────────────────────────────────────────────────────
   State
   ───────────────────────────────────────────────────── */
const state = {
  defaults: { htc: 3.0, emissivity: 0.35 },
  materials: {},
  elements: {},
  panels: [],
  solver: {
    global_current: 1000,
    T_ambient: 20,
    T0: 20,
    accuracy: 0.1,
    dt_init: 1.0,
    air_interval: 5.0,
    end_time: 28800
  }
};

const ui = {
  section: 'elements',
  selectedElement: null,
  selectedMaterial: null,
  selectedPanel: 0,
  errors: [],
  showOverrides: false
};

/* ─────────────────────────────────────────────────────
   Starter example
   ───────────────────────────────────────────────────── */
function loadExample() {
  state.defaults = { htc: 3.0, emissivity: 0.35 };
  state.materials = {};
  state.elements = {
    VBB:   { type: 'busbar', material: 'Cu', width: 10, height: 40,  length: 50,  n: 2, angle: -90 },
    MBB:   { type: 'busbar', material: 'Cu', width: 10, height: 30,  length: 50,  n: 4, angle: 0 },
    FISHP: { type: 'busbar', material: 'Cu', width: 10, height: 100, length: 100, n: 2, angle: 0 },
    ACB:   { type: 'breaker', material: 'CuACB', width: 20, height: 100, length: 50, n: 1, angle: -90 }
  };
  const segs = {
    main_busbar: [ { element: 'FISHP', count: 1 }, { element: 'MBB', count: 10 } ],
    angle_bars:  [ { element: 'VBB', count: 2, angle: 90 }, { element: 'VBB', count: 2, angle: 0 }, { element: 'VBB', count: 6 } ],
    io_bars:     [ { element: 'VBB', count: 3, angle: 180 }, { element: 'VBB', count: 22, angle: 90 }, { element: 'VBB', count: 1, angle: 0 } ],
    breaker:     [ { element: 'ACB', count: 4 } ]
  };
  state.panels = [
    { type: 'DC2BB', height: 2100, mbb_height: 1250, load: 2500, T0: null,
      ventilation: 'closed', panel_depth: 600,
      main_busbar: deepCopy(segs.main_busbar), angle_bars: deepCopy(segs.angle_bars),
      io_bars: deepCopy(segs.io_bars), breaker: deepCopy(segs.breaker) },
    { type: 'DC2BB', height: 2100, mbb_height: 1250, load: -2500, T0: null,
      ventilation: 'closed', panel_depth: 600,
      main_busbar: deepCopy(segs.main_busbar), angle_bars: deepCopy(segs.angle_bars),
      io_bars: deepCopy(segs.io_bars), breaker: deepCopy(segs.breaker) }
  ];
  state.solver = {
    global_current: 1000, T_ambient: 20, T0: 20,
    accuracy: 0.1, dt_init: 1.0, air_interval: 5.0, end_time: 28800
  };
  ui.selectedElement = 'VBB';
  ui.selectedPanel = 0;
}

function clearLineup() {
  state.defaults = { htc: 3.0, emissivity: 0.35 };
  state.materials = {};
  state.elements = {};
  state.panels = [];
  state.solver = {
    global_current: 1000, T_ambient: 20, T0: 20,
    accuracy: 0.1, dt_init: 1.0, air_interval: 5.0, end_time: 28800
  };
  ui.selectedElement = null;
  ui.selectedPanel = 0;
}

function deepCopy(o) { return JSON.parse(JSON.stringify(o)); }

/* ─────────────────────────────────────────────────────
   Validation
   ───────────────────────────────────────────────────── */
const NAME_RE = /^[A-Za-z][A-Za-z0-9_]*$/;

function validate() {
  const errs = [];
  // custom materials
  Object.entries(state.materials).forEach(([name, m]) => {
    if (!NAME_RE.test(name)) errs.push(`Material name "${name}" must be alphanumeric/underscore and start with a letter`);
    if (MATERIALS[name]) errs.push(`Material "${name}" shadows a built-in material name`);
    if (!(m.sigma > 0)) errs.push(`Material "${name}": sigma must be > 0`);
    if (!(m.alpha > 0)) errs.push(`Material "${name}": alpha must be > 0`);
    if (!(m.k > 0))     errs.push(`Material "${name}": k must be > 0`);
    if (!(m.density > 0)) errs.push(`Material "${name}": density must be > 0`);
    if (!(m.Cp > 0))    errs.push(`Material "${name}": Cp must be > 0`);
  });
  // elements
  const elemNames = Object.keys(state.elements);
  elemNames.forEach(name => {
    if (!NAME_RE.test(name)) errs.push(`Element name "${name}" must be alphanumeric/underscore and start with a letter`);
    const e = state.elements[name];
    if (!e.material || (!MATERIALS[e.material] && !state.materials[e.material]))
      errs.push(`Element "${name}": invalid material "${e.material || '?'}"`);
    if (!(e.length > 0)) errs.push(`Element "${name}": length must be > 0`);
    if (!(e.n >= 1) || !Number.isInteger(e.n)) errs.push(`Element "${name}": n must be a positive integer`);
    if (e.type === 'busbar' || e.type === 'breaker') {
      if (!(e.width > 0))  errs.push(`Element "${name}": width must be > 0`);
      if (!(e.height > 0)) errs.push(`Element "${name}": height must be > 0`);
    } else if (e.type === 'cable') {
      if (!(e.outer_diameter > 0)) errs.push(`Element "${name}": outer_diameter must be > 0`);
      if (e.inner_diameter != null && e.inner_diameter >= e.outer_diameter)
        errs.push(`Element "${name}": inner_diameter must be < outer_diameter`);
    }
  });
  // panels
  state.panels.forEach((p, idx) => {
    if (!(p.height > 0))     errs.push(`Panel ${idx + 1}: height must be > 0`);
    if (!(p.mbb_height > 0)) errs.push(`Panel ${idx + 1}: mbb_height must be > 0`);
    if (p.mbb_height > p.height) errs.push(`Panel ${idx + 1}: mbb_height (${p.mbb_height}) exceeds panel height (${p.height})`);
    const validVent = ['closed', 'louvers', 'open'];
    if (p.ventilation && !validVent.includes(p.ventilation) && isNaN(parseFloat(p.ventilation)))
      errs.push(`Panel ${idx + 1}: ventilation must be 'closed', 'louvers', 'open', or a numeric W/m²K value`);
    const grps = p.type === 'MCC'
      ? ['main_busbar']
      : ['main_busbar', 'angle_bars', 'io_bars', 'breaker'];
    grps.forEach(grp => {
      (p[grp] || []).forEach((row, rIdx) => {
        if (row.sensor !== undefined) return;  // sensor markers are always valid
        if (!row.element || !elemNames.includes(row.element))
          errs.push(`Panel ${idx + 1} ${grp}[${rIdx}]: element "${row.element || '?'}" not defined`);
        if (!(row.count >= 1) || !Number.isInteger(row.count))
          errs.push(`Panel ${idx + 1} ${grp}[${rIdx}]: count must be a positive integer`);
      });
    });
    if (p.type === 'MCC') {
      if (!(p.dbb_length > 0)) errs.push(`Panel ${idx + 1} (MCC): dbb_length must be > 0`);
      if (!p.dbb_element || !elemNames.includes(p.dbb_element))
        errs.push(`Panel ${idx + 1} (MCC): dbb_element "${p.dbb_element || '?'}" not defined`);
      if (!p.modules || p.modules.length === 0)
        errs.push(`Panel ${idx + 1} (MCC): at least one module is required`);
      (p.modules || []).forEach((m, mIdx) => {
        if (typeof m.load !== 'number' || !isFinite(m.load))
          errs.push(`Panel ${idx + 1} module ${mIdx + 1}: load must be a number`);
        if (!m.device || m.device.length === 0)
          errs.push(`Panel ${idx + 1} module ${mIdx + 1}: device segment is required`);
        ['incoming_bars', 'device', 'outgoing'].forEach(grp => {
          (m[grp] || []).forEach((row, rIdx) => {
            if (!row.element || !elemNames.includes(row.element))
              errs.push(`Panel ${idx + 1} module ${mIdx + 1} ${grp}[${rIdx}]: element "${row.element || '?'}" not defined`);
          });
        });
      });
    } else {
      if (typeof p.load !== 'number' || !isFinite(p.load)) errs.push(`Panel ${idx + 1}: load must be a number`);
    }
  });
  // solver basics
  if (!(state.solver.accuracy > 0))   errs.push('Solver: accuracy must be > 0');
  if (!(state.solver.dt_init > 0))    errs.push('Solver: dt_init must be > 0');
  if (!(state.solver.end_time > 0))   errs.push('Solver: end_time must be > 0');
  if (!(state.solver.air_interval > 0)) errs.push('Solver: air_interval must be > 0');
  ui.errors = errs;
  return errs.length === 0;
}

/* ─────────────────────────────────────────────────────
   YAML generation
   ───────────────────────────────────────────────────── */
function fmtNum(v) {
  if (v === null || v === undefined) return '';
  if (Number.isInteger(v)) return String(v);
  // strip trailing zeros, keep up to 6 digits
  return parseFloat(v.toFixed(6)).toString();
}

function fmtMatNum(v) {
  // For large values (e.g. sigma=58e6), emit compact scientific notation
  if (!isFinite(v)) return '0';
  const abs = Math.abs(v);
  if (abs >= 10000) {
    const e = Math.floor(Math.log10(abs));
    const eRound = Math.floor(e / 3) * 3;
    const m = parseFloat((v / Math.pow(10, eRound)).toPrecision(4));
    return `${m}e${eRound}`;
  }
  return fmtNum(v);
}

function generateYAML() {
  const lines = [];
  // defaults
  lines.push('defaults:');
  lines.push(`  htc: ${fmtNum(state.defaults.htc)}`);
  lines.push(`  emissivity: ${fmtNum(state.defaults.emissivity)}`);
  lines.push('');

  // custom materials (omitted if none)
  const customMatNames = Object.keys(state.materials);
  if (customMatNames.length > 0) {
    lines.push('materials:');
    customMatNames.forEach(name => {
      const m = state.materials[name];
      lines.push(`  ${name}:`);
      lines.push(`    sigma: ${fmtMatNum(m.sigma)}`);
      lines.push(`    alpha: ${fmtMatNum(m.alpha)}`);
      lines.push(`    k: ${fmtMatNum(m.k)}`);
      lines.push(`    density: ${fmtMatNum(m.density)}`);
      lines.push(`    Cp: ${fmtMatNum(m.Cp)}`);
    });
    lines.push('');
  }

  // elements
  lines.push('elements:');
  const elemNames = Object.keys(state.elements);
  if (elemNames.length === 0) {
    lines.push('  {}');
  } else {
    elemNames.forEach(name => {
      const e = state.elements[name];
      lines.push(`  ${name}:`);
      lines.push(`    type: ${e.type}`);
      lines.push(`    material: ${e.material}`);
      if (e.type === 'cable') {
        lines.push(`    outer_diameter: ${fmtNum(e.outer_diameter)}`);
        if (e.inner_diameter != null && e.inner_diameter > 0)
          lines.push(`    inner_diameter: ${fmtNum(e.inner_diameter)}`);
      } else {
        lines.push(`    width: ${fmtNum(e.width)}`);
        lines.push(`    height: ${fmtNum(e.height)}`);
      }
      lines.push(`    length: ${fmtNum(e.length)}`);
      if (e.n > 1) lines.push(`    n: ${fmtNum(e.n)}`);
      const defAng = TYPE_DEFAULT_ANGLE[e.type] ?? 0;
      if (e.angle != null && e.angle !== defAng) lines.push(`    angle: ${fmtNum(e.angle)}`);
      if (e.htc != null)         lines.push(`    htc: ${fmtNum(e.htc)}`);
      if (e.emissivity != null)  lines.push(`    emissivity: ${fmtNum(e.emissivity)}`);
      if (e.ac_factor != null)   lines.push(`    ac_factor: ${fmtNum(e.ac_factor)}`);
    });
  }
  lines.push('');

  // panels
  lines.push('panels:');
  if (state.panels.length === 0) {
    lines.push('  []');
  } else {
    function emitSegRows(rows, indent) {
      rows.forEach(r => {
        if (r.sensor !== undefined) {
          lines.push(`${indent}- {sensor: ${JSON.stringify(r.sensor)}}`);
          return;
        }
        const parts = [`element: ${r.element}`, `count: ${fmtNum(r.count)}`];
        if (r.angle != null) parts.push(`angle: ${fmtNum(r.angle)}`);
        lines.push(`${indent}- {${parts.join(', ')}}`);
      });
    }
    state.panels.forEach(p => {
      lines.push(`  - type: ${p.type}`);
      lines.push(`    height: ${fmtNum(p.height)}`);
      if (p.mbb_height !== MBB_HEIGHT_DEFAULT)
        lines.push(`    mbb_height: ${fmtNum(p.mbb_height)}`);
      if (p.T0 != null) lines.push(`    T0: ${fmtNum(p.T0)}`);
      if (p.ventilation && p.ventilation !== 'closed')
        lines.push(`    ventilation: ${p.ventilation}`);
      if (p.panel_depth && p.panel_depth !== 600)
        lines.push(`    panel_depth: ${fmtNum(p.panel_depth)}`);
      if (p.type === 'MCC') {
        lines.push(`    dbb_length: ${fmtNum(p.dbb_length ?? 1900)}`);
        lines.push(`    dbb_element: ${p.dbb_element || ''}`);
        const mbRows = p.main_busbar || [];
        if (mbRows.length > 0) {
          lines.push(`    main_busbar:`);
          emitSegRows(mbRows, '      ');
        }
        lines.push(`    modules:`);
        (p.modules || []).forEach(m => {
          lines.push(`      - load: ${fmtNum(m.load)}`);
          lines.push(`        height: ${fmtNum(m.height ?? 200)}`);
          ['incoming_bars', 'device', 'outgoing'].forEach(grp => {
            const rows = m[grp] || [];
            if (rows.length === 0) return;
            lines.push(`        ${grp}:`);
            emitSegRows(rows, '          ');
          });
        });
      } else {
        lines.push(`    load: ${fmtNum(p.load)}`);
        ['main_busbar', 'angle_bars', 'io_bars', 'breaker'].forEach(grp => {
          const rows = p[grp] || [];
          if (rows.length === 0) return;
          lines.push(`    ${grp}:`);
          emitSegRows(rows, '      ');
        });
      }
    });
  }
  lines.push('');

  // solver
  lines.push('solver:');
  lines.push(`  global_current: ${fmtNum(state.solver.global_current)}`);
  lines.push(`  T_ambient: ${fmtNum(state.solver.T_ambient)}`);
  lines.push(`  T0: ${fmtNum(state.solver.T0)}`);
  lines.push(`  accuracy: ${fmtNum(state.solver.accuracy)}`);
  lines.push(`  dt_init: ${fmtNum(state.solver.dt_init)}`);
  lines.push(`  air_interval: ${fmtNum(state.solver.air_interval)}`);
  lines.push(`  end_time: ${fmtNum(state.solver.end_time)}`);

  return lines.join('\n');
}

/* ─────────────────────────────────────────────────────
   YAML parsing (subset specific to this schema)
   ───────────────────────────────────────────────────── */
function parseScalar(raw) {
  raw = raw.trim();
  if (raw === '' || raw === '~' || raw === 'null') return null;
  if (raw === 'true') return true;
  if (raw === 'false') return false;
  if (/^-?\d+$/.test(raw)) return parseInt(raw, 10);
  if (/^-?\d*\.\d+(?:[eE][+-]?\d+)?$/.test(raw)) return parseFloat(raw);
  if (/^-?\d+[eE][+-]?\d+$/.test(raw)) return parseFloat(raw);
  if ((raw.startsWith('"') && raw.endsWith('"')) ||
      (raw.startsWith("'") && raw.endsWith("'"))) return raw.slice(1, -1);
  return raw;
}

function parseInlineObj(s) {
  // expects "{key: val, key: val, ...}"
  s = s.trim();
  if (!s.startsWith('{') || !s.endsWith('}')) return null;
  s = s.slice(1, -1).trim();
  if (!s) return {};
  const obj = {};
  // split top-level commas (no nesting expected here)
  s.split(',').forEach(part => {
    const [k, ...rest] = part.split(':');
    if (!k) return;
    obj[k.trim()] = parseScalar(rest.join(':'));
  });
  return obj;
}

function indentOf(line) {
  const m = line.match(/^( *)/);
  return m ? m[1].length : 0;
}

function parseYAML(text) {
  // returns a plain JS object; supports our schema only
  const lines = text.split('\n').map(l => l.replace(/\t/g, '  ')).filter(l => {
    const t = l.trim();
    return t !== '' && !t.startsWith('#');
  });

  const root = {};
  let i = 0;

  function parseBlock(parentObj, parentIndent) {
    while (i < lines.length) {
      const line = lines[i];
      const ind = indentOf(line);
      if (ind <= parentIndent) return;
      const body = line.slice(ind);

      // list item under a mapping key
      if (body.startsWith('- ')) {
        // happens when parentObj is actually an array container — handled in array path
        return;
      }
      // key: value or key:
      const m = body.match(/^([A-Za-z_][A-Za-z0-9_]*):\s*(.*)$/);
      if (!m) { i++; continue; }
      const key = m[1];
      const rest = m[2];

      if (rest === '' || rest === undefined) {
        // could be a nested mapping or a list
        i++;
        // peek next non-empty
        if (i < lines.length) {
          const nextInd = indentOf(lines[i]);
          const nextBody = lines[i].slice(nextInd);
          if (nextInd > ind && nextBody.startsWith('- ')) {
            // list
            const arr = [];
            while (i < lines.length) {
              const l2 = lines[i];
              const l2ind = indentOf(l2);
              const l2body = l2.slice(l2ind);
              if (l2ind <= ind) break;
              if (!l2body.startsWith('- ')) break;
              const afterDash = l2body.slice(2);
              if (afterDash.startsWith('{')) {
                // inline-flow object
                arr.push(parseInlineObj(afterDash));
                i++;
              } else {
                // block-style mapping element
                const item = {};
                // first "key: val" right after the dash
                const im = afterDash.match(/^([A-Za-z_][A-Za-z0-9_]*):\s*(.*)$/);
                if (im) {
                  const k2 = im[1];
                  const r2 = im[2];
                  if (r2 === '') {
                    i++;
                    // could be sub-block
                    item[k2] = {};
                    parseBlock(item[k2], l2ind);
                  } else {
                    item[k2] = parseScalar(r2);
                    i++;
                  }
                } else {
                  i++;
                }
                // continue collecting properties indented deeper than dash item
                const itemIndent = l2ind + 2;
                while (i < lines.length) {
                  const l3 = lines[i];
                  const l3ind = indentOf(l3);
                  const l3body = l3.slice(l3ind);
                  if (l3ind < itemIndent) break;
                  if (l3body.startsWith('- ')) break;
                  const km = l3body.match(/^([A-Za-z_][A-Za-z0-9_]*):\s*(.*)$/);
                  if (!km) { i++; continue; }
                  const k3 = km[1];
                  const r3 = km[2];
                  if (r3 === '') {
                    i++;
                    // nested list — handles both inline {…} and block-style mapping items (MCC modules)
                    const subArr = [];
                    while (i < lines.length) {
                      const l4 = lines[i];
                      const l4ind = indentOf(l4);
                      const l4body = l4.slice(l4ind);
                      if (l4ind <= l3ind) break;
                      if (!l4body.startsWith('- ')) break;
                      const after4 = l4body.slice(2);
                      if (after4.startsWith('{')) {
                        subArr.push(parseInlineObj(after4)); i++;
                      } else {
                        // block-style mapping item (e.g. MCC module)
                        const bItem = {};
                        const bm = after4.match(/^([A-Za-z_][A-Za-z0-9_]*):\s*(.*)$/);
                        if (bm) { bItem[bm[1]] = bm[2] === '' ? null : parseScalar(bm[2]); }
                        i++;
                        const bIndent = l4ind + 2;
                        while (i < lines.length) {
                          const l5 = lines[i]; const l5ind = indentOf(l5); const l5body = l5.slice(l5ind);
                          if (l5ind < bIndent) break;
                          if (l5body.startsWith('- ')) break;
                          const km5 = l5body.match(/^([A-Za-z_][A-Za-z0-9_]*):\s*(.*)$/);
                          if (!km5) { i++; continue; }
                          if (km5[2] === '') {
                            i++;
                            // sub-sub-array of inline objects (e.g. incoming_bars, device, outgoing)
                            const ssa = [];
                            while (i < lines.length) {
                              const l6 = lines[i]; const l6ind = indentOf(l6); const l6body = l6.slice(l6ind);
                              if (l6ind <= l5ind) break;
                              if (!l6body.startsWith('- ')) break;
                              const a6 = l6body.slice(2);
                              if (a6.startsWith('{')) ssa.push(parseInlineObj(a6));
                              i++;
                            }
                            bItem[km5[1]] = ssa;
                          } else {
                            bItem[km5[1]] = parseScalar(km5[2]); i++;
                          }
                        }
                        subArr.push(bItem);
                      }
                    }
                    item[k3] = subArr;
                  } else {
                    item[k3] = parseScalar(r3);
                    i++;
                  }
                }
                arr.push(item);
              }
            }
            parentObj[key] = arr;
          } else if (nextInd > ind) {
            // nested mapping
            parentObj[key] = {};
            parseBlock(parentObj[key], ind);
          } else {
            parentObj[key] = null;
          }
        } else {
          parentObj[key] = null;
        }
      } else if (rest.startsWith('{')) {
        parentObj[key] = parseInlineObj(rest);
        i++;
      } else if (rest === '[]') {
        parentObj[key] = [];
        i++;
      } else if (rest === '{}') {
        parentObj[key] = {};
        i++;
      } else {
        parentObj[key] = parseScalar(rest);
        i++;
      }
    }
  }

  parseBlock(root, -1);
  return root;
}

function loadFromYAMLText(text) {
  try {
    const parsed = parseYAML(text);
    // Merge into state
    if (parsed.defaults) {
      state.defaults.htc = parsed.defaults.htc ?? state.defaults.htc;
      state.defaults.emissivity = parsed.defaults.emissivity ?? state.defaults.emissivity;
    }
    if (parsed.materials && typeof parsed.materials === 'object') {
      state.materials = {};
      Object.entries(parsed.materials).forEach(([name, src]) => {
        if (!src || typeof src !== 'object') return;
        state.materials[name] = {
          sigma:   src.sigma   != null ? Number(src.sigma)   : 58e6,
          alpha:   src.alpha   != null ? Number(src.alpha)   : 3.9e-3,
          k:       src.k       != null ? Number(src.k)       : 401,
          density: src.density != null ? Number(src.density) : 8920,
          Cp:      src.Cp      != null ? Number(src.Cp)      : 385,
        };
      });
    }
    if (parsed.elements && typeof parsed.elements === 'object') {
      state.elements = {};
      Object.keys(parsed.elements).forEach(name => {
        const src = parsed.elements[name] || {};
        const e = {
          type: src.type || 'busbar',
          material: src.material || 'Cu',
          length: src.length ?? 0,
          n: src.n != null ? src.n : 1
        };
        if (e.type === 'cable') {
          e.outer_diameter = src.outer_diameter ?? 0;
          e.inner_diameter = src.inner_diameter ?? 0;
        } else {
          e.width = src.width ?? 0;
          e.height = src.height ?? 0;
        }
        e.angle = (src.angle != null) ? src.angle : TYPE_DEFAULT_ANGLE[e.type];
        if (src.htc != null) e.htc = src.htc;
        if (src.emissivity != null) e.emissivity = src.emissivity;
        if (src.ac_factor != null) e.ac_factor = src.ac_factor;
        state.elements[name] = e;
      });
    }
    if (Array.isArray(parsed.panels)) {
      state.panels = parsed.panels.map(p => {
        const ptype = (p.type || 'DC2BB').toUpperCase();
        if (ptype === 'MCC') {
          return {
            type: 'MCC',
            height: p.height ?? 2100,
            mbb_height: p.mbb_height ?? 2000,
            dbb_length: p.dbb_length ?? 1900,
            T0: p.T0 != null ? p.T0 : null,
            ventilation: p.ventilation ?? 'closed',
            panel_depth: p.panel_depth ?? 600,
            dbb_element: p.dbb_element || '',
            main_busbar: Array.isArray(p.main_busbar) ? p.main_busbar : [],
            modules: Array.isArray(p.modules) ? p.modules.map(m => ({
              load:   m.load   ?? 0,
              height: m.height ?? 200,
              incoming_bars: Array.isArray(m.incoming_bars) ? m.incoming_bars : [],
              device:        Array.isArray(m.device)        ? m.device        : [],
              outgoing:      Array.isArray(m.outgoing)      ? m.outgoing      : []
            })) : []
          };
        }
        return {
          type: 'DC2BB',
          height: p.height ?? 2100,
          mbb_height: p.mbb_height ?? MBB_HEIGHT_DEFAULT,
          load: p.load ?? 0,
          T0: p.T0 != null ? p.T0 : null,
          ventilation: p.ventilation ?? 'closed',
          panel_depth: p.panel_depth ?? 600,
          main_busbar: Array.isArray(p.main_busbar) ? p.main_busbar : [],
          angle_bars:  Array.isArray(p.angle_bars)  ? p.angle_bars  : [],
          io_bars:     Array.isArray(p.io_bars)     ? p.io_bars     : [],
          breaker:     Array.isArray(p.breaker)     ? p.breaker     : []
        };
      });
    }
    if (parsed.solver && typeof parsed.solver === 'object') {
      Object.keys(state.solver).forEach(k => {
        if (parsed.solver[k] != null) state.solver[k] = parsed.solver[k];
      });
    }
    const eNames = Object.keys(state.elements);
    ui.selectedElement = eNames[0] || null;
    ui.selectedMaterial = Object.keys(state.materials)[0] || null;
    ui.selectedPanel = state.panels.length > 0 ? 0 : 0;
    return true;
  } catch (err) {
    console.error('YAML parse error', err);
    return false;
  }
}

/* ─────────────────────────────────────────────────────
   Rendering — Left panel
   ───────────────────────────────────────────────────── */
function renderLeft() {
  // tabs
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.section === ui.section);
  });

  const hdr = document.getElementById('left-hdr');
  const list = document.getElementById('item-list');
  const addBtn = document.getElementById('add-btn');
  list.innerHTML = '';

  if (ui.section === 'elements') {
    hdr.textContent = 'Element Library';
    addBtn.style.display = '';
    addBtn.textContent = '+ Add Element';
    const names = Object.keys(state.elements);
    if (names.length === 0) {
      list.innerHTML = `<div class="left-hint">No elements yet.<br>Click "+ Add Element" below.</div>`;
    } else {
      names.forEach(name => {
        const e = state.elements[name];
        const row = document.createElement('div');
        row.className = 'item-row' + (name === ui.selectedElement ? ' active' : '');
        row.innerHTML = `
          <span class="item-name" title="${escapeHtml(name)}">${escapeHtml(name)}</span>
          <span class="item-badge ${e.type}">${e.type}</span>
          <button class="item-del" title="Delete element">×</button>
        `;
        row.addEventListener('click', (ev) => {
          if (ev.target.closest('.item-del')) return;
          ui.selectedElement = name;
          render();
        });
        row.querySelector('.item-del').addEventListener('click', (ev) => {
          ev.stopPropagation();
          if (confirm(`Delete element "${name}"?`)) {
            delete state.elements[name];
            if (ui.selectedElement === name) {
              const remaining = Object.keys(state.elements);
              ui.selectedElement = remaining[0] || null;
            }
            render();
          }
        });
        list.appendChild(row);
      });
    }
  } else if (ui.section === 'panels') {
    hdr.textContent = 'Lineup Panels';
    addBtn.style.display = '';
    addBtn.textContent = '+ Add Panel';
    if (state.panels.length === 0) {
      list.innerHTML = `<div class="left-hint">No panels yet.<br>Click "+ Add Panel" below.</div>`;
    } else {
      state.panels.forEach((p, idx) => {
        const row = document.createElement('div');
        row.className = 'item-row' + (idx === ui.selectedPanel ? ' active' : '');
        let subLabel;
        if (p.type === 'MCC') {
          const n = (p.modules || []).length;
          subLabel = `<span class="item-type-badge" style="font-size:9px;color:#0ea5e9;font-family:monospace">MCC·${n}mod</span>`;
        } else {
          const loadCls = p.load > 0 ? 'pos' : (p.load < 0 ? 'neg' : '');
          const loadSign = p.load > 0 ? '+' : '';
          subLabel = `<span class="item-load ${loadCls}">${loadSign}${p.load} A</span>`;
        }
        row.innerHTML = `
          <span class="item-name">Panel ${idx + 1}</span>
          ${subLabel}
          <button class="item-move" title="Move up" onclick="movePanelUp(${idx})" ${idx === 0 ? 'disabled' : ''}>▲</button>
          <button class="item-move" title="Move down" onclick="movePanelDown(${idx})" ${idx === state.panels.length - 1 ? 'disabled' : ''}>▼</button>
          <button class="item-del" title="Delete panel">×</button>
        `;
        row.addEventListener('click', (ev) => {
          if (ev.target.closest('.item-del, .item-move')) return;
          ui.selectedPanel = idx;
          render();
        });
        row.querySelector('.item-del').addEventListener('click', (ev) => {
          ev.stopPropagation();
          if (confirm(`Delete Panel ${idx + 1}?`)) {
            state.panels.splice(idx, 1);
            if (ui.selectedPanel >= state.panels.length)
              ui.selectedPanel = Math.max(0, state.panels.length - 1);
            render();
          }
        });
        list.appendChild(row);
      });
    }
  } else if (ui.section === 'materials') {
    hdr.textContent = 'Custom Materials';
    addBtn.style.display = '';
    addBtn.textContent = '+ Add Material';
    const names = Object.keys(state.materials);
    if (names.length === 0) {
      list.innerHTML = `<div class="left-hint">No custom materials.<br>Built-in: ${Object.keys(MATERIALS).join(', ')}.<br>Click "+ Add Material" below.</div>`;
    } else {
      names.forEach(name => {
        const row = document.createElement('div');
        row.className = 'item-row' + (name === ui.selectedMaterial ? ' active' : '');
        row.innerHTML = `
          <span class="item-name" title="${escapeHtml(name)}">${escapeHtml(name)}</span>
          <span class="item-badge" style="background:#fef3c7;color:#92620a">custom</span>
          <button class="item-del" title="Delete material">×</button>
        `;
        row.addEventListener('click', (ev) => {
          if (ev.target.closest('.item-del')) return;
          ui.selectedMaterial = name;
          render();
        });
        row.querySelector('.item-del').addEventListener('click', (ev) => {
          ev.stopPropagation();
          if (confirm(`Delete material "${name}"?`)) {
            delete state.materials[name];
            if (ui.selectedMaterial === name) {
              const remaining = Object.keys(state.materials);
              ui.selectedMaterial = remaining[0] || null;
            }
            render();
          }
        });
        list.appendChild(row);
      });
    }
  } else {
    // defaults or solver
    hdr.textContent = ui.section === 'defaults' ? 'Global Defaults' : 'Solver Settings';
    addBtn.style.display = 'none';
    list.innerHTML = `<div class="left-hint">Edit settings on the right →</div>`;
  }
}

/* ─────────────────────────────────────────────────────
   Rendering — Centre panel
   ───────────────────────────────────────────────────── */
function renderCentre() {
  const c = document.getElementById('centre-panel');
  if (ui.section === 'defaults')       c.innerHTML = renderDefaults();
  else if (ui.section === 'materials') c.innerHTML = renderMaterialEditor();
  else if (ui.section === 'elements')  c.innerHTML = renderElementEditor();
  else if (ui.section === 'panels')    c.innerHTML = renderPanelEditor();
  else if (ui.section === 'solver')    c.innerHTML = renderSolver();
  attachCentreHandlers();
}

      </div>
    `;
  }
  const m = state.materials[name];
  return `
    <div class="card">
      <div class="card-hdr">Material — ${escapeHtml(name)}</div>
      <div class="prop-field" style="margin-bottom:12px">
        <label class="prop-lbl">Key <span class="u">(identifier used in YAML and element definitions)</span></label>
        <input class="prop-inp" type="text" id="mat-name" value="${escapeHtml(name)}" style="font-family:monospace;font-weight:600">
      </div>
      <div class="prop-grid cols2">
        <div class="prop-field">
          <label class="prop-lbl">σ (sigma) <span class="u">[S/m]</span></label>

          <div class="prop-help">Electrical conductivity at 20°C. Cu≈58e6, Al≈35e6.</div>
        </div>
        <div class="prop-field">
          <label class="prop-lbl">α (alpha) <span class="u">[1/K]</span></label>
          <input class="prop-inp" type="number" step="0.0001" min="0" data-matbind="${escapeHtml(name)}.alpha" value="${m.alpha}">
          <div class="prop-help">Temperature coefficient of resistance. Cu≈0.0039.</div>
        </div>
        <div class="prop-field">
          <label class="prop-lbl">k <span class="u">[W/mK]</span></label>
          <input class="prop-inp" type="number" step="1" min="0" data-matbind="${escapeHtml(name)}.k" value="${m.k}">
          <div class="prop-help">Thermal conductivity. Cu≈401, Al≈237.</div>
        </div>
        <div class="prop-field">
          <label class="prop-lbl">Density <span class="u">[kg/m³]</span></label>
          <input class="prop-inp" type="number" step="10" min="0" data-matbind="${escapeHtml(name)}.density" value="${m.density}">
          <div class="prop-help">Mass density. Cu≈8920, Al≈2700.</div>
        </div>
        <div class="prop-field">
          <label class="prop-lbl">Cp <span class="u">[J/kgK]</span></label>
          <input class="prop-inp" type="number" step="1" min="0" data-matbind="${escapeHtml(name)}.Cp" value="${m.Cp}">
          <div class="prop-help">Specific heat capacity. Cu≈385, Al≈900.</div>
        </div>

  `;

function renderDefaults() {

    <div class="card">
      <div class="card-hdr">Global Defaults</div>
      <div class="card-hint">These are applied to all elements unless overridden per-element.</div>
      <div class="prop-grid">
        <div class="prop-field">
          <label class="prop-lbl">HTC <span class="u">[W/m²K]</span></label>
          <input class="prop-inp" type="number" step="0.1" min="0" data-bind="defaults.htc" value="${state.defaults.htc}">
          <div class="prop-help">Convective heat-transfer coefficient.</div>
        </div>
        <div class="prop-field">
          <label class="prop-lbl">Emissivity <span class="u">[0…1]</span></label>
          <input class="prop-inp" type="number" step="0.01" min="0" max="1" data-bind="defaults.emissivity" value="${state.defaults.emissivity}">

        </div>

}

  if (!name || !state.elements[name]) {
    return `
      <div class="empty-state">
        <span class="icon">⟵</span>

      </div>
    `;
  }

    <div class="prop-field">
      <label class="prop-lbl">Outer Diameter <span class="u">[mm]</span></label>
      <input class="prop-inp" type="number" step="0.5" min="0" data-bind="elements.${name}.outer_diameter" value="${e.outer_diameter ?? 0}">
    </div>

      <label class="prop-lbl">Inner Diameter <span class="u">[mm]</span></label>
      <input class="prop-inp" type="number" step="0.5" min="0" data-bind="elements.${name}.inner_diameter" value="${e.inner_diameter ?? 0}">
      <div class="prop-help">Set 0 for solid cable.</div>
    </div>
  ` : `
    <div class="prop-field">
      <label class="prop-lbl">Width <span class="u">[mm]</span></label>
      <input class="prop-inp" type="number" step="1" min="0" data-bind="elements.${name}.width" value="${e.width ?? 0}">

      <label class="prop-lbl">Height <span class="u">[mm]</span></label>

    <div class="card">
      <div class="card-hdr">Element — ${escapeHtml(name)}</div>
      <div class="prop-grid">
        <div class="prop-field">

          <input class="prop-inp" type="text" id="elem-name" value="${escapeHtml(name)}" data-rename="${escapeHtml(name)}">
          <div class="prop-help">Alphanumeric + underscore, must start with a letter.</div>

        <div class="prop-field">
          <label class="prop-lbl">Type</label>
          <select class="prop-sel" data-bind="elements.${name}.type">
            <option value="busbar"  ${e.type==='busbar'?'selected':''}>Busbar</option>
            <option value="breaker" ${e.type==='breaker'?'selected':''}>Breaker</option>
            <option value="cable"   ${e.type==='cable'?'selected':''}>Cable</option>
          </select>
        </div>
        <div class="prop-field">
          <label class="prop-lbl">Material</label>
          <select class="prop-sel" data-bind="elements.${name}.material">
            <optgroup label="Built-in">

            </optgroup>

          <label class="prop-lbl">Length <span class="u">[mm]</span></label>

      <div style="margin-top:14px">

          <div class="prop-title">Optional overrides</div>

            <div class="prop-field">

function elementShapeSVG(e) {
  if (e.type === 'cable') {
    const r = 60;
    const innerR = e.outer_diameter > 0 ? r * (e.inner_diameter / e.outer_diameter) : 0;
    return `
      <svg width="220" height="130" viewBox="0 0 220 130">
        <circle cx="110" cy="65" r="${r}" fill="#fef3c7" stroke="${getComputedStyleVar('--col-io')}" stroke-width="2"/>
        ${innerR > 0 ? `<circle cx="110" cy="65" r="${innerR}" fill="#fff" stroke="${getComputedStyleVar('--col-io')}" stroke-width="1.5" stroke-dasharray="3,2"/>` : ''}
        <text x="110" y="125" text-anchor="middle" font-size="11" fill="#374151">⌀ ${fmtNum(e.outer_diameter)} mm${innerR > 0 ? ` (inner ${fmtNum(e.inner_diameter)})` : ''}</text>
        <text x="110" y="12" text-anchor="middle" font-size="10" fill="#6b7280">Length: ${fmtNum(e.length)} mm × n=${e.n}</text>
      </svg>
    `;
  }
  // busbar / breaker
  const maxDim = Math.max(e.width || 1, e.height || 1);
  const scale = 80 / maxDim;
  const w = Math.max(8, (e.width || 1) * scale);
  const h = Math.max(8, (e.height || 1) * scale);
  const cx = 110, cy = 60;
  const fillCol = e.type === 'breaker' ? '#ede9fe' : '#dbeafe';
  const strokeCol = e.type === 'breaker' ? getComputedStyleVar('--col-brk') : getComputedStyleVar('--col-angle');
  const hatch = e.type === 'breaker' ? `
    <defs>
      <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="6" stroke="${strokeCol}" stroke-width="1.2" opacity=".55"/>
      </pattern>
    </defs>
    <rect x="${cx - w/2}" y="${cy - h/2}" width="${w}" height="${h}" fill="url(#hatch)"/>
  ` : '';
  return `
    <svg width="220" height="130" viewBox="0 0 220 130">
      <rect x="${cx - w/2}" y="${cy - h/2}" width="${w}" height="${h}" fill="${fillCol}" stroke="${strokeCol}" stroke-width="2"/>
      ${hatch}
      <text x="${cx}" y="${cy + h/2 + 16}" text-anchor="middle" font-size="11" fill="#374151">W=${fmtNum(e.width)} mm × H=${fmtNum(e.height)} mm</text>
      <text x="${cx}" y="12" text-anchor="middle" font-size="10" fill="#6b7280">Length: ${fmtNum(e.length)} mm × n=${e.n}</text>
      <text x="6" y="${cy + 3}" font-size="9" fill="#9ca3af">W</text>
      <text x="${cx + w/2 + 6}" y="${cy + 3}" font-size="9" fill="#9ca3af">H</text>
    </svg>
  `;
}

function getComputedStyleVar(varName) {
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim() || '#0078d4';
}

/* Panel editor */
function renderPanelEditor() {
  if (state.panels.length === 0) {
    return `
      <div class="empty-state">
        <span class="icon">⟵</span>
        No panels defined.<br>Click <b>"+ Add Panel"</b> to add one.
      </div>
    `;
  }
  const idx = ui.selectedPanel;
  const p = state.panels[idx];
  if (!p) {
    return `<div class="empty-state">Select a panel on the left.</div>`;
  }
  if (p.type === 'MCC') return renderMCCEditor(p, idx);
  return `
    <div class="card">
      <div class="card-hdr" style="display:flex;align-items:center;gap:8px">
        <span>Panel ${idx + 1}</span>
        <select class="panel-type-sel" onchange="switchPanelType(${idx}, this.value)">
          <option value="DC2BB" selected>DC2BB</option>
          <option value="MCC">MCC</option>
        </select>
      </div>
      <div class="prop-grid cols4">
        <div class="prop-field">
          <label class="prop-lbl">Height <span class="u">[mm]</span></label>
          <input class="prop-inp" type="number" step="10" min="0" data-bind="panels.${idx}.height" value="${p.height}">
        </div>
        <div class="prop-field">
          <label class="prop-lbl">MBB Height <span class="u">[mm]</span></label>
          <input class="prop-inp" type="number" step="10" min="0" data-bind="panels.${idx}.mbb_height" value="${p.mbb_height}">
        </div>
        <div class="prop-field">
          <label class="prop-lbl">Load <span class="u">[A]</span></label>
          <input class="prop-inp" type="number" step="50" data-bind="panels.${idx}.load" value="${p.load}" title="+ outgoing / − incoming">
          <div class="prop-help">+ outgoing, − incoming</div>
        </div>
        <div class="prop-field">
          <label class="prop-lbl">T₀ <span class="u">[°C, optional]</span></label>
          <input class="prop-inp" type="number" step="1" data-bind="panels.${idx}.T0" data-nullable value="${p.T0 ?? ''}" placeholder="(global)">
        </div>
        <div class="prop-field">
          <label class="prop-lbl">Ventilation</label>
          <select class="prop-sel" data-bind="panels.${idx}.ventilation">
            <option value="closed"  ${(p.ventilation??'closed')==='closed'  ?'selected':''}>closed  (IP54, sealed)</option>
            <option value="louvers" ${(p.ventilation??'closed')==='louvers' ?'selected':''}>louvers (IP31, vents)</option>
            <option value="open"    ${(p.ventilation??'closed')==='open'    ?'selected':''}>open    (IP20, mesh)</option>
          </select>
        </div>
        <div class="prop-field">
          <label class="prop-lbl">Depth <span class="u">[mm]</span></label>
          <input class="prop-inp" type="number" step="50" min="100" data-bind="panels.${idx}.panel_depth" value="${p.panel_depth ?? 600}" title="Enclosure front-to-back depth">
        </div>
      </div>
    </div>

}

function switchPanelType(idx, newType) {
  const p = state.panels[idx];
  if (!p || p.type === newType) return;
  if (!confirm(`Convert Panel ${idx + 1} to ${newType}? Panel-specific settings will be reset.`)) {
    render(); return;
  }
  if (newType === 'MCC') {
    const mbb = p.main_busbar || [];
    state.panels[idx] = {
      type: 'MCC',
      height: p.height, mbb_height: p.mbb_height,
      dbb_length: 1900, T0: p.T0,
      ventilation: p.ventilation ?? 'closed',
      panel_depth: p.panel_depth ?? 600,
      dbb_element: '', main_busbar: mbb, modules: []
    };
  } else {
    state.panels[idx] = {
      type: 'DC2BB', height: p.height, mbb_height: p.mbb_height,
      load: 0, T0: p.T0,
      ventilation: p.ventilation ?? 'closed',
      panel_depth: p.panel_depth ?? 600,
      main_busbar: p.main_busbar || [], angle_bars: [], io_bars: [], breaker: []
    };
  }
  render();
}

function moveMCCModuleUp(pIdx, mIdx) {
  const mods = state.panels[pIdx]?.modules;
  if (!mods || mIdx <= 0) return;
  [mods[mIdx - 1], mods[mIdx]] = [mods[mIdx], mods[mIdx - 1]];
  render();
}

function moveMCCModuleDown(pIdx, mIdx) {
  const mods = state.panels[pIdx]?.modules;
  if (!mods || mIdx >= mods.length - 1) return;
  [mods[mIdx], mods[mIdx + 1]] = [mods[mIdx + 1], mods[mIdx]];
  render();
}

function addMCCModule(pIdx) {
  const p = state.panels[pIdx];
  if (!p) return;
  const firstElem = Object.keys(state.elements)[0] || '';
  p.modules.push({
    load: 0,
    height: 200,
    incoming_bars: [{ element: firstElem, count: 1 }],
    device:        [{ element: firstElem, count: 1 }],
    outgoing:      []
  });
  render();
}

function deleteMCCModule(pIdx, mIdx) {
  const p = state.panels[pIdx];
  if (!p || !p.modules) return;
  if (confirm(`Delete Module ${mIdx + 1}?`)) {
    p.modules.splice(mIdx, 1);
    render();
  }
}
